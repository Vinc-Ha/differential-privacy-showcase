<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Experience Differential Privacy</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = {
    darkMode: 'class',
    theme: { extend: { colors: {
      cispa: { DEFAULT:'#0091B5', light:'#4DC8E0', dark:'#006B8A', dim:'#003D52' }
    }}}
  }</script>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="dark bg-gray-950 text-gray-100 overflow-hidden antialiased">
  <div id="root"></div>

  <script type="text/babel">
    // ─── Inject light-mode CSS after Tailwind's sheet ────────────────────────
    ;(() => {
      const s = document.createElement('style');
      s.id = 'dp-light-theme';
      s.textContent = `
        html.light body,[html.light] { background-color:#f1f5f9!important; color:#0f172a!important; }
        html.light [class*="bg-gray-950"] { background-color:#f1f5f9!important; }
        html.light [class*="bg-gray-900"] { background-color:#ffffff!important; }
        html.light [class*="bg-gray-800"] { background-color:#e2e8f0!important; }
        html.light [class*="border-gray-8"] { border-color:#cbd5e1!important; }
        html.light [class*="border-gray-7"] { border-color:#e2e8f0!important; }
        html.light .text-gray-100 { color:#0f172a!important; }
        html.light .text-gray-200 { color:#1e293b!important; }
        html.light .text-gray-300 { color:#334155!important; }
        html.light .text-gray-400 { color:#475569!important; }
        html.light .text-gray-500 { color:#64748b!important; }
        html.light .text-gray-600 { color:#94a3b8!important; }
        html.light .text-gray-700 { color:#b0bec5!important; }
        html.light [class*="bg-red-950"]    { background-color:rgba(254,226,226,.7)!important; }
        html.light [class*="bg-green-950"]  { background-color:rgba(220,252,231,.7)!important; }
        html.light [class*="bg-amber-950"]  { background-color:rgba(254,243,199,.7)!important; }
        html.light [class*="bg-cispa-dim"]  { background-color:rgba(224,242,254,.8)!important; }
        html.light [class*="border-red-9"]  { border-color:#fca5a5!important; }
        html.light [class*="border-green-9"]{ border-color:#86efac!important; }
        html.light [class*="border-amber-8"],html.light [class*="border-amber-9"] { border-color:#fde68a!important; }
        html.light [class*="border-cispa-dim"] { border-color:#bfdbfe!important; }
        html.light .text-red-300   { color:#dc2626!important; }
        html.light .text-red-400   { color:#ef4444!important; }
        html.light .text-green-300 { color:#16a34a!important; }
        html.light .text-green-400 { color:#22c55e!important; }
        html.light .text-amber-300 { color:#b45309!important; }
        html.light .text-amber-400 { color:#d97706!important; }
        html.light .text-amber-500 { color:#f59e0b!important; }
        html.light .text-emerald-400 { color:#059669!important; }
        html.light select { background-color:#fff!important; color:#0f172a!important; border-color:#cbd5e1!important; }
        .theme-toggle { font-size:1.1rem; background:none; border:none; cursor:pointer; transition:opacity .2s; }
        .theme-toggle:hover { opacity:.7; }
      `;
      document.head.appendChild(s);
    })();

    const { useState, useMemo, useEffect, useContext, createContext } = React;

    // ─── Theme context ────────────────────────────────────────────────────────
    const ThemeCtx = createContext({ isDark: true, toggleDark: () => {} });

    // ─── Dataset ──────────────────────────────────────────────────────────────
    const DATABASE_D = [
      { id:1,  name:'Alice M.',   dept:'Engineering', salary:95000,  sick:4 },
      { id:2,  name:'Bob K.',     dept:'Engineering', salary:88000,  sick:6 },
      { id:3,  name:'Eve P.',     dept:'Engineering', salary:105000, sick:3 },
      { id:4,  name:'Henry J.',   dept:'Engineering', salary:91000,  sick:5 },
      { id:5,  name:'Isabel R.',  dept:'Engineering', salary:98000,  sick:4 },
      { id:6,  name:'James T.',   dept:'Engineering', salary:82000,  sick:7 },
      { id:7,  name:'Carol T.',   dept:'Sales',       salary:72000,  sick:8 },
      { id:8,  name:'Frank N.',   dept:'Sales',       salary:78000,  sick:7 },
      { id:9,  name:'Karen L.',   dept:'Sales',       salary:68000,  sick:9 },
      { id:10, name:'Leo B.',     dept:'Sales',       salary:75000,  sick:6 },
      { id:11, name:'Mia S.',     dept:'Sales',       salary:71000,  sick:8 },
      { id:12, name:'David L.',   dept:'HR',          salary:65000,  sick:5 },
      { id:13, name:'Grace H.',   dept:'HR',          salary:62000,  sick:9 },
      { id:14, name:'Nina P.',    dept:'HR',          salary:67000,  sick:6 },
      { id:15, name:'Oscar M.',   dept:'HR',          salary:63000,  sick:7 },
    ];

    // x earns $200,000 - revealed only after the quiz
    const PERSON_X = { id:16, name:'Morgan X.', dept:'Engineering', salary:200000, sick:2 };
    const DATABASE_DX = [...DATABASE_D, PERSON_X];

    // ─── Statistics ───────────────────────────────────────────────────────────
    function computeStats(data) {
      const n = data.length;
      return {
        avgSalary: data.reduce((a, r) => a + r.salary, 0) / n,
        avgSick:   data.reduce((a, r) => a + r.sick,   0) / n,
        engCount:  data.filter(r => r.dept === 'Engineering').length,
        maxSalary: Math.max(...data.map(r => r.salary)),
      };
    }

    const STATS_D  = computeStats(DATABASE_D);   // avgSalary≈78667
    const STATS_DX = computeStats(DATABASE_DX);  // avgSalary=86250

    const STAT_DEFS = [
      { key:'avgSalary', label:'Mean salary',           icon:'💼',
        fmt: v => `$${Math.round(v).toLocaleString()}`,
        sensitivity: PERSON_X.salary / DATABASE_DX.length },   // 200000/16 = 12500
      { key:'avgSick',   label:'Mean sick days / yr',   icon:'🏥',
        fmt: v => v.toFixed(2),
        sensitivity: 30 / DATABASE_DX.length },
      { key:'engCount',  label:'Engineering headcount', icon:'👥',
        fmt: v => String(Math.round(v)),
        sensitivity: 1 },
    ];

    // ─── DP Math ──────────────────────────────────────────────────────────────
    function laplaceSample(b) {
      if (b === 0) return 0;
      const u = Math.random() - 0.5;
      return -b * Math.sign(u) * Math.log(1 - 2 * Math.abs(u));
    }

    // ─── ML Phase data & helpers ──────────────────────────────────────────────
    const UNIT_NOISE = Object.fromEntries(
      DATABASE_DX.map(r => [r.id, {
        salary: (Math.random() - 0.5) * 2,
        sick:   (Math.random() - 0.5) * 2,
      }])
    );

    const MI_CARDS = [
      { id:'a1', text: 'Alice M. earns $95,000 per year',      baseScore: 0.91 },
      { id:'a3', text: 'Eve P. works in Engineering',          baseScore: 0.89 },
      { id:'a5', text: 'Grace H. takes 9 sick days per year',  baseScore: 0.87 },
      { id:'a6', text: 'Morgan X. earns $200,000 per year',    baseScore: 0.92, scary: true },
    ];

    function membershipScore(baseScore, epsilon) {
      const t = Math.min(1, epsilon / 5);
      return baseScore * t + 0.5 * (1 - t);
    }

    function mulberry32(seed) {
      let a = seed | 0;
      return () => {
        a = (a + 0x6D2B79F5) | 0;
        let t = Math.imul(a ^ (a >>> 15), 1 | a);
        t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
        return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
      };
    }

    const TOKEN_POOL = [
      'pursuant','amortized','bilateral','contingent','fiduciary',
      'nominal','aggregate','provisional','variable','intermittent',
      'redundant','latent','procedural','quarterly','membrane',
      'tribunal','syndicate','liaison','disbursement','stipend',
      'allocation','entitlement','framework','oversight','standby',
      'mandate','protocol','directive','bylaw','threshold',
      'accrual','deferral','indemnity','covenant','whereas',
      'hereinafter','notwithstanding','aforementioned','thereof','annex',
      'severance','benchmark','clause','subsection','amendment',
      'remediation','recalibration','subroutine','encumbrance','rollover',
    ];

    function gibWords(rng, count) {
      return Array.from({ length: count },
        () => TOKEN_POOL[Math.floor(rng() * TOKEN_POOL.length)]
      ).join(' ');
    }

    const ADJ_DEPTS = ['Product', 'Finance', 'Legal', 'Operations', 'Marketing', 'IT', 'Strategy'];
    const ADJ_QUAL  = ['Division', 'Services', 'Group', 'Unit', 'Team', 'Ops', 'Bureau'];
    const ADJ_SALS  = [12000, 185000, 22000, 295000, 8500, 42000, 210000, 55000, 3200, 400000];
    const ADJ_SICK  = [0, 30, 25, 52, 45, 18, 38, 60];

    function getCompletion(emp, epsilon) {
      const n = UNIT_NOISE[emp.id];
      if (epsilon >= 4) {
        return { salary: `$${emp.salary.toLocaleString()}`, dept: emp.dept,
                 sick: `${emp.sick}`, quality: 'exact' };
      }
      if (epsilon >= 1.2) {
        const nSal  = Math.max(20000, Math.round(emp.salary + n.salary * 32000 / epsilon));
        const nSick = Math.max(0, Math.round(emp.sick + n.sick * 7 / epsilon));
        const depts = ['Engineering', 'Sales', 'HR'];
        const wrongIdx = (depts.indexOf(emp.dept) + (n.salary > 0 ? 1 : 2)) % 3;
        return { salary: `$${nSal.toLocaleString()}`,
                 dept: epsilon >= 2.5 ? emp.dept : depts[wrongIdx],
                 sick: `${nSick}`, quality: 'noisy' };
      }
      const step = Math.round(epsilon * 10);
      const base = emp.id * 997 + step * 137;
      const rD   = mulberry32(base + 1);
      const rS   = mulberry32(base + 2);
      const rK   = mulberry32(base + 3);
      const pick = (rng, arr) => arr[Math.floor(rng() * arr.length)];
      if (epsilon >= 0.9) {
        const nSal  = Math.max(10000, Math.round(emp.salary + (rS() - 0.5) * 60000));
        const nSick = Math.max(0, Math.round(emp.sick + (rK() - 0.5) * 8));
        return { dept: `${emp.dept} ${pick(rD, ADJ_QUAL)}`, salary: `$${nSal.toLocaleString()}`,
                 sick: `${nSick}`, quality: 'protected' };
      } else if (epsilon >= 0.6) {
        return { dept: pick(rD, ADJ_DEPTS), salary: `$${pick(rS, ADJ_SALS).toLocaleString()}`,
                 sick: `${pick(rK, ADJ_SICK)}`, quality: 'protected' };
      } else if (epsilon >= 0.3) {
        const tok1 = TOKEN_POOL[Math.floor(rD() * TOKEN_POOL.length)];
        const tok2 = TOKEN_POOL[Math.floor(rS() * TOKEN_POOL.length)];
        const tok3 = TOKEN_POOL[Math.floor(rK() * TOKEN_POOL.length)];
        return { dept: `${pick(rD, ADJ_DEPTS)} ${tok1}`,
                 salary: `${tok2} $${Math.round(rS() * 300000 + 5000).toLocaleString()}`,
                 sick: tok3, quality: 'protected' };
      } else {
        return { dept: gibWords(mulberry32(base + 10), 3), salary: gibWords(mulberry32(base + 11), 4),
                 sick: gibWords(mulberry32(base + 12), 2), quality: 'protected' };
      }
    }

    function CompletionChip({ text, quality }) {
      return (
        <span className={`inline-block px-1.5 py-0.5 rounded font-mono font-semibold mx-0.5 ${
          quality === 'exact'  ? 'text-red-300   bg-red-950/70   border border-red-900/60' :
          quality === 'noisy'  ? 'text-amber-300 bg-amber-950/70 border border-amber-900/60' :
                                 'text-green-300 bg-green-950/70 border border-green-900/60'}`}>
          {text}
        </span>
      );
    }

    // ─── Quiz ─────────────────────────────────────────────────────────────────
    const QUESTIONS = [
      {
        key: 'salary',
        q: 'Mean salary rose from $78,667 → $86,250 when x joined.',
        prompt: "What is x's exact salary?",
        options: ['Below $70k', '$70k – $90k', 'Above $90k'],
        correct: 2,
        math: `x's salary = 16 × $86,250 − 15 × $78,667 = $1,380,000 − $1,180,005 = $199,995 ≈ $200,000`,
      },
    ];

    // ─── Step bar ─────────────────────────────────────────────────────────────
    function StepBar({ current, onStep, showAdvanced, onToggleAdvanced }) {
      const { isDark, toggleDark } = useContext(ThemeCtx);
      const allSteps = ['D vs D+x', 'Infer x', 'DP', 'ML model', 'Research'];
      const steps = showAdvanced ? allSteps : allSteps.slice(0, 3);

      return (
        <div className="shrink-0 pb-2">
          <div className="flex items-center justify-between mb-2">
            {/* Left: hide/show toggle + logo */}
            <div className="flex items-center gap-2">
              <button onClick={onToggleAdvanced}
                className="text-[10px] uppercase tracking-wider text-gray-600 hover:text-gray-400 border border-gray-800 rounded px-2 py-1 transition-colors whitespace-nowrap">
                {showAdvanced ? '▼ Full' : '▶ Present'}
              </button>
              <div className="bg-white rounded-lg px-3 py-1.5">
                <img src="769b98b74099646aa6bb597caefa24abfbecd74b.png"
                  alt="CISPA" className="h-8 w-auto" />
              </div>
            </div>
            <div className="flex items-center gap-3">
              <span className="text-[10px] text-gray-700 uppercase tracking-wider">Differential Privacy</span>
              <button onClick={toggleDark} className="theme-toggle" title="Toggle light/dark mode">
                {isDark ? '☀️' : '🌙'}
              </button>
            </div>
          </div>
          <div className="flex items-center gap-1">
            {steps.map((s, i) => (
              <React.Fragment key={s}>
                <button onClick={() => onStep(i)}
                  className={`flex items-center gap-1.5 text-xs transition-colors cursor-pointer ${
                    i === current ? 'text-cispa-light' :
                    i < current  ? 'text-gray-500 hover:text-gray-300' :
                                   'text-gray-700 hover:text-gray-500'}`}>
                  <span className={`w-5 h-5 rounded-full flex items-center justify-center text-[10px] font-bold ${
                    i === current ? 'bg-cispa text-white' :
                    i < current  ? 'bg-gray-800 text-gray-500' :
                                   'border border-gray-800 text-gray-700'}`}>{i+1}</span>
                  <span className="hidden sm:inline">{s}</span>
                </button>
                {i < steps.length-1 && <div className={`flex-1 h-px mx-1 ${i < current ? 'bg-gray-700' : 'bg-gray-800'}`} />}
              </React.Fragment>
            ))}
          </div>
        </div>
      );
    }

    // ─── Landing ──────────────────────────────────────────────────────────────
    function Landing({ onStart }) {
      const { isDark, toggleDark } = useContext(ThemeCtx);
      return (
        <div className="h-screen flex flex-col items-center justify-center text-center px-8 gap-6">
          <button onClick={toggleDark} className="theme-toggle absolute top-6 right-6" title="Toggle light/dark mode">
            {isDark ? '☀️' : '🌙'}
          </button>
          <div className="bg-white rounded-2xl px-8 py-4 shadow-lg">
            <img src="769b98b74099646aa6bb597caefa24abfbecd74b.png"
              alt="CISPA – Helmholtz Center for Information Security"
              className="h-12 w-auto" />
          </div>
          <h1 className="text-4xl font-bold max-w-3xl leading-tight">
            What can aggregate statistics reveal about you?
          </h1>
          <p className="text-gray-400 max-w-md text-base">
            Knowing the mean salary before and after you join a database
            is enough to infer your exact salary.
          </p>
          <button onClick={onStart}
            className="px-10 py-4 rounded-lg bg-cispa hover:bg-cispa-light text-base font-medium transition-colors">
            Show me
          </button>
        </div>
      );
    }

    // ─── Phase 1: D vs D+x ───────────────────────────────────────────────────
    const DEPT_COLORS = {
      Engineering: 'text-cispa',
      Sales:       'text-emerald-400',
      HR:          'text-amber-400',
    };

    function PhaseCompare({ onContinue, goToStep, showAdvanced, onToggleAdvanced }) {
      const [xAdded, setXAdded] = useState(false);
      useEffect(() => {
        function onKey(e) {
          if (e.key !== 'ArrowRight') return;
          if (!xAdded) setXAdded(true);
          else onContinue();
        }
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, [xAdded, onContinue]);
      return (
        <div className="h-screen overflow-hidden flex flex-col max-w-5xl mx-auto px-6 py-2">
          <StepBar current={0} onStep={goToStep} showAdvanced={showAdvanced} onToggleAdvanced={onToggleAdvanced} />
          <div className="flex items-center justify-between mb-2 shrink-0">
            <div>
              <h2 className="text-2xl font-bold">
                Database <span className="font-mono text-cispa-light">{xAdded ? 'D+x' : 'D'}</span>
                <span className="text-gray-600 text-sm font-normal ml-2">- {xAdded ? 16 : 15} records</span>
              </h2>
              <p className="text-sm text-gray-500 mt-0.5">
                The analyst sees only the aggregate statistics on the right - never individual rows.
              </p>
            </div>
            {!xAdded && (
              <button onClick={() => setXAdded(true)}
                className="shrink-0 px-4 py-2.5 rounded-lg border border-dashed border-cispa/60 hover:border-indigo-400 hover:bg-cispa-dim/40 text-cispa hover:text-cispa-light text-sm font-medium transition-all">
                + x joins →
              </button>
            )}
          </div>
          <div className="flex-1 grid grid-cols-1 lg:grid-cols-5 gap-4 min-h-0">
            <div className="lg:col-span-3 border border-gray-800 rounded-xl overflow-hidden flex flex-col min-h-0">
              <div className="flex-1 overflow-y-auto">
                <table className="w-full text-sm">
                  <thead className="sticky top-0 bg-gray-900 text-gray-500">
                    <tr>
                      <th className="px-4 py-3 text-left font-medium">Name</th>
                      <th className="px-4 py-3 text-left font-medium">Dept</th>
                      <th className="px-4 py-3 text-right font-medium">Salary</th>
                      <th className="px-4 py-3 text-right font-medium">Sick days</th>
                    </tr>
                  </thead>
                  <tbody className="bg-gray-900/30">
                    {DATABASE_D.map(r => (
                      <tr key={r.id} className="border-t border-gray-800/60 text-gray-300 hover:bg-gray-800/30">
                        <td className="px-4 py-2 font-mono">{r.name}</td>
                        <td className={`px-4 py-2 ${DEPT_COLORS[r.dept]}`}>{r.dept}</td>
                        <td className="px-4 py-2 text-right">${r.salary.toLocaleString()}</td>
                        <td className="px-4 py-2 text-right">{r.sick}</td>
                      </tr>
                    ))}
                    {xAdded && (
                      <tr className="border-t-2 border-indigo-500 bg-cispa-dim/60">
                        <td className="px-4 py-2.5 font-mono text-cispa-light font-semibold">x</td>
                        <td className="px-4 py-2.5 text-indigo-800 italic text-xs">private</td>
                        <td className="px-4 py-2.5 text-right text-indigo-800 italic text-xs">private</td>
                        <td className="px-4 py-2.5 text-right text-indigo-800 italic text-xs">private</td>
                      </tr>
                    )}
                  </tbody>
                </table>
              </div>
            </div>
            <div className="lg:col-span-2 flex flex-col gap-2 min-h-0">
              {STAT_DEFS.map(def => {
                const dVal    = STATS_D[def.key];
                const dxVal   = STATS_DX[def.key];
                const delta   = dxVal - dVal;
                const changed = xAdded && delta !== 0;
                const up      = delta > 0;
                return (
                  <div key={def.key} className={`border rounded-xl px-5 py-4 flex-1 flex flex-col justify-center transition-all duration-500 ${
                    changed ? 'border-amber-700/50 bg-amber-950/20' : 'border-gray-800 bg-gray-900/40'}`}>
                    <div className="text-sm text-gray-500 uppercase tracking-wider mb-2">
                      {def.icon} {def.label}
                    </div>
                    <div className="flex items-end justify-between">
                      <span className="font-mono text-4xl font-bold">
                        {def.fmt(xAdded ? dxVal : dVal)}
                      </span>
                      {changed && (
                        <span className={`text-lg font-mono font-bold ${up ? 'text-red-400' : 'text-emerald-400'}`}>
                          {up ? '▲' : '▼'} {def.fmt(Math.abs(delta))}
                        </span>
                      )}
                    </div>
                  </div>
                );
              })}
              {xAdded && (
                <button onClick={onContinue}
                  className="w-full py-3 rounded-xl bg-cispa hover:bg-cispa-light text-sm font-medium transition-colors shrink-0">
                  What does this reveal about x? →
                </button>
              )}
            </div>
          </div>
        </div>
      );
    }

    // ─── Phase 2: Quiz ────────────────────────────────────────────────────────
    function PhaseMCQA({ onContinue, goToStep, showAdvanced, onToggleAdvanced }) {
      const [guesses,  setGuesses]  = useState({});
      const [revealed, setRevealed] = useState(false);
      const allAnswered = QUESTIONS.every(q => guesses[q.key] !== undefined);
      const score = QUESTIONS.filter(q => guesses[q.key] === q.correct).length;

      useEffect(() => {
        function onKey(e) {
          if (e.key !== 'ArrowRight') return;
          if (!allAnswered) {
            // Select the correct answer for any unanswered question
            setGuesses(gs => {
              const next = { ...gs };
              QUESTIONS.forEach(q => { if (next[q.key] === undefined) next[q.key] = q.correct; });
              return next;
            });
          } else if (!revealed) {
            setRevealed(true);
          } else {
            onContinue();
          }
        }
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, [allAnswered, revealed, onContinue]);

      return (
        <div className="h-screen overflow-hidden flex flex-col max-w-3xl mx-auto px-6 py-2">
          <StepBar current={1} onStep={goToStep} showAdvanced={showAdvanced} onToggleAdvanced={onToggleAdvanced} />
          <h2 className="text-2xl font-bold mb-1 shrink-0">Infer x's profile</h2>
          <p className="text-sm text-gray-500 mb-2 shrink-0">
            The analyst sees only how the statistics shifted. What can they deduce?
          </p>
          <div className="flex-1 overflow-y-auto min-h-0">
            {QUESTIONS.map((q) => {
              const g = guesses[q.key];
              return (
                <div key={q.key} className="border border-gray-800 rounded-xl overflow-hidden">
                  <div className="bg-gray-900 px-6 py-5 border-b border-gray-800">
                    <span className="text-xs text-gray-600 uppercase tracking-wider mr-2">Observed</span>
                    <span className="text-base font-mono text-amber-300">{q.q}</span>
                  </div>
                  <div className="px-6 pt-6 pb-5">
                    <p className="text-xl font-semibold text-gray-200 mb-6">{q.prompt}</p>
                    <div className="space-y-4">
                      {q.options.map((opt, oi) => {
                        const chosen  = g === oi;
                        const correct = revealed && oi === q.correct;
                        const wrong   = revealed && chosen && oi !== q.correct;
                        return (
                          <button key={oi} onClick={() => !revealed && setGuesses(gs => ({ ...gs, [q.key]: oi }))}
                            className={`w-full text-left px-6 py-5 rounded-lg border text-base transition-colors ${
                              correct ? 'border-green-700 bg-green-950/40 text-green-300' :
                              wrong   ? 'border-red-800  bg-red-950/30  text-red-300' :
                              chosen  ? 'border-cispa bg-cispa-dim/50 text-cispa-light' :
                                        'border-gray-800 text-gray-400 hover:border-gray-600'
                            } ${revealed ? 'cursor-default' : 'cursor-pointer'}`}>
                            <span className="text-sm text-gray-600 font-mono mr-2">{String.fromCharCode(97+oi)})</span>
                            {opt}
                            {correct && ' ✓'}{wrong && ' ✗'}
                          </button>
                        );
                      })}
                    </div>
                  </div>
                  {revealed && (
                    <div className="px-4 pb-4">
                      <p className="text-xs text-gray-500 font-mono bg-gray-900/60 rounded px-3 py-2">
                        {q.math}
                      </p>
                    </div>
                  )}
                </div>
              );
            })}
          </div>
          <div className="shrink-0 pt-3 space-y-3">
            {allAnswered && !revealed && (
              <button onClick={() => setRevealed(true)}
                className="w-full py-3 rounded-xl bg-cispa hover:bg-cispa-light text-sm font-medium transition-colors">
                Check answers
              </button>
            )}
            {revealed && (
              <>
                <div className="border border-gray-800 rounded-xl px-4 py-3 flex items-center justify-between">
                  <div>
                    <span className="text-2xl font-bold">{score===1 ? '✓' : '✗'}</span>
                    <span className="text-sm text-gray-500 ml-2">
                      {score===1 ? 'Exact salary recovered from one query.' : 'Try the math - one query is enough.'}
                    </span>
                  </div>
                  <div className="text-right text-sm font-mono space-y-0.5">
                    <div className="text-cispa-light font-semibold">{PERSON_X.name}</div>
                    <div className="text-gray-400">salary: ${PERSON_X.salary.toLocaleString()}</div>
                  </div>
                </div>
                <button onClick={onContinue}
                  className="w-full py-3 rounded-xl bg-cispa hover:bg-cispa-light text-sm font-medium transition-colors">
                  How does DP protect x? →
                </button>
              </>
            )}
          </div>
        </div>
      );
    }

    // Salary distribution chart
    // Two modes toggled by a button:
    //   'mean'   - Laplace distribution of reported mean(D+x) vs exact mean(D)
    //   'salary' - Laplace distribution of inferred x salary vs true salary ($200k)
    // The noise scale for the salary mode is N_DX times the mean noise scale.
    function SalaryDistribution({ epsilon, noiseScale, inferredSalary }) {
      const [mode, setMode] = useState('salary');
      const W = 560, H = 160;

      // --- mode: mean ---
      const muD        = STATS_D.avgSalary;   // 78,667
      const muDX       = STATS_DX.avgSalary;  // 86,250
      const meanNoise  = noiseScale;           // scale of mean(D+x) Laplace

      // --- mode: salary ---
      // inferred salary = N_DX * mean(D+x)_noisy - N_D * mean(D)
      // noise on inferred salary = N_DX * noise on mean(D+x) => scale_sal = N_DX * meanNoise
      const trueSalary = PERSON_X.salary;     // 200,000
      const salNoise   = DATABASE_DX.length * meanNoise;  // amplified noise

      const centre  = mode === 'mean' ? muDX        : trueSalary;
      const scale   = mode === 'mean' ? meanNoise   : salNoise;
      const refLine = mode === 'mean' ? muD         : trueSalary;   // amber line
      const blueVal = mode === 'mean' ? muDX        : inferredSalary; // teal marker

      const halfSpan = Math.max(
        mode === 'mean' ? 30000 : 150000,
        scale * 3.5
      );
      const xMin = Math.min(centre, refLine) - halfSpan;
      const xMax = Math.max(centre, refLine) + halfSpan;
      const toSvgX = v => ((v - xMin) / (xMax - xMin)) * W;

      const laplacePdf = x => {
        if (epsilon === Infinity || scale === 0) return 0;
        return Math.exp(-Math.abs(x - centre) / scale) / (2 * scale);
      };

      const peakPdf  = epsilon === Infinity ? 1 : laplacePdf(centre);
      const normalize = v => peakPdf > 0 ? (v / peakPdf) * (H - 18) : 0;

      const steps = 160;
      const points = Array.from({ length: steps + 1 }, (_, i) => {
        const x = xMin + (i / steps) * (xMax - xMin);
        const y = H - 10 - normalize(laplacePdf(x));
        return `${toSvgX(x).toFixed(1)},${y.toFixed(1)}`;
      });
      const curvePath = `M ${points.join(' L ')}`;
      const fillPath  = `M ${toSvgX(xMin)},${H-10} L ${points.join(' L ')} L ${toSvgX(xMax)},${H-10} Z`;

      const xRef  = toSvgX(refLine).toFixed(1);
      const xBlue = toSvgX(blueVal).toFixed(1);
      const xCentre = toSvgX(centre).toFixed(1);

      // overlap = distribution wide enough to cover the reference line
      const overlapping = epsilon !== Infinity && scale > Math.abs(centre - refLine) * 0.5;

      // x-axis ticks: 6 evenly spaced values
      const tickCount = 6;
      const ticks = Array.from({ length: tickCount }, (_, i) => {
        const val = xMin + (i / (tickCount - 1)) * (xMax - xMin);
        return { val, x: toSvgX(val) };
      });

      const refLabel  = mode === 'mean' ? 'mean(D)'    : 'true salary';
      const blueLabel = mode === 'mean' ? 'mean(D+x)'  : 'inferred';

      return (
        <div className="border border-gray-800 rounded-xl p-4 mb-3 shrink-0">
          <div className="flex items-center justify-between mb-2">
            <div className="text-xs text-gray-600 uppercase tracking-wider">
              {mode === 'mean' ? 'Reported mean(D+x) distribution' : 'Inferred salary distribution'}
            </div>
            <div className="flex items-center gap-2">
              <div className={`text-xs font-semibold px-2.5 py-1 rounded-full border transition-all duration-500 ${
                overlapping
                  ? 'border-green-700 bg-green-950/40 text-green-300'
                  : 'border-red-800 bg-red-950/30 text-red-300'}`}>
                {overlapping ? 'Protected' : 'Recoverable'}
              </div>
              <button onClick={() => setMode(m => m === 'mean' ? 'salary' : 'mean')}
                className="text-[10px] uppercase tracking-wider text-gray-600 hover:text-gray-400 border border-gray-800 rounded px-2 py-1 transition-colors">
                {mode === 'mean' ? 'Show salary' : 'Show mean'}
              </button>
            </div>
          </div>

          <svg width="100%" viewBox={`0 0 ${W} ${H}`} className="overflow-visible">
            {/* Fill */}
            {epsilon !== Infinity && <path d={fillPath} fill="rgba(0,145,181,0.12)" />}
            {/* Curve */}
            {epsilon !== Infinity && <path d={curvePath} fill="none" stroke="#0091B5" strokeWidth="1.5" />}

            {/* Reference line (amber) */}
            <line x1={xRef} y1="14" x2={xRef} y2={H-10} stroke="#f59e0b" strokeWidth="2" strokeDasharray="4,3" />
            <text x={xRef} y="2" textAnchor="middle" fontSize="8" fill="#f59e0b" dominantBaseline="hanging">{refLabel}</text>

            {/* Blue marker: mode=mean shows true mean(D+x), mode=salary shows current inferred value */}
            {epsilon === Infinity
              ? <line x1={xCentre} y1="14" x2={xCentre} y2={H-10} stroke="#4DC8E0" strokeWidth="2" />
              : <line x1={xBlue}   y1="14" x2={xBlue}   y2={H-10} stroke="#4DC8E0" strokeWidth="1.5" strokeDasharray="2,3" opacity="0.7" />
            }
            <text x={epsilon === Infinity ? xCentre : xBlue} y="2" textAnchor="middle" fontSize="8" fill="#4DC8E0" dominantBaseline="hanging">{blueLabel}</text>

            {/* X-axis line */}
            <line x1="0" y1={H-10} x2={W} y2={H-10} stroke="#374151" strokeWidth="0.5" />

            {/* Ticks */}
            {ticks.map(({ val, x }, i) => (
              <g key={i}>
                <line x1={x} y1={H-10} x2={x} y2={H-7} stroke="#4B5563" strokeWidth="0.5" />
                <text x={x} y={H-5} textAnchor="middle" fontSize="7" fill="#6B7280" dominantBaseline="hanging">
                  {val >= 1000 ? `$${Math.round(val/1000)}k` : `$${Math.round(val)}`}
                </text>
              </g>
            ))}
          </svg>
        </div>
      );
    }

    // ─── Phase 3: DP ─────────────────────────────────────────────────────────
    function PhaseDP({ onContinue, onRestart, goToStep, showAdvanced, onToggleAdvanced }) {
      // p = 0 (left) = no privacy, p = 1 (right) = high privacy
      // ε = 2.5 / p  so max noise at p=1 is manageable (~±$80k inferred)
      const [sliderVal, setSliderVal] = useState(0);
      const [seed, setSeed] = useState(0);
      const p       = sliderVal / 100;
      const epsilon = p === 0 ? Infinity : 2.5 / p;

      const def = STAT_DEFS[0]; // avgSalary only

      // Only D+x gets Laplace noise; D is reported exactly
      const noisyDXMean = useMemo(() => {
        if (epsilon === Infinity) return STATS_DX.avgSalary;
        const noise = laplaceSample(def.sensitivity / epsilon);
        return Math.max(0, STATS_DX.avgSalary + noise);
      }, [epsilon, seed]);

      const exactDMean    = STATS_D.avgSalary;
      const inferredSalary = DATABASE_DX.length * noisyDXMean - DATABASE_D.length * exactDMean;
      const salaryError    = Math.abs(inferredSalary - PERSON_X.salary);

      const recoveryStatus =
        p < 0.3  ? 'fail' :
        p < 0.55 ? 'partial' :
                   'protected';

      const noiseScale = epsilon === Infinity ? 0 : def.sensitivity / epsilon;

      const privacyLabel =
        p === 0    ? 'No protection' :
        p < 0.3    ? 'Minimal protection' :
        p < 0.5    ? 'Weak protection' :
        p < 0.7    ? 'Moderate protection' :
        p < 0.9    ? 'Strong protection' :
                     'Maximum protection';

      const inferredFmt = inferredSalary < 0
        ? `−$${Math.abs(Math.round(inferredSalary)).toLocaleString()}`
        : def.fmt(inferredSalary);

      return (
        <div className="h-screen overflow-hidden flex flex-col max-w-4xl mx-auto px-6 py-3">
          <StepBar current={2} onStep={goToStep} showAdvanced={showAdvanced} onToggleAdvanced={onToggleAdvanced} />
          <h2 className="text-2xl font-bold mb-0.5 shrink-0">Differential privacy</h2>
          <p className="text-sm text-gray-500 mb-3 shrink-0">
            We add Laplace noise only to the D+x query. Can the analyst still infer x's salary of <span className="font-mono text-amber-300">$200,000</span>?
          </p>

          {/* Slider */}
          <div className="border border-gray-800 rounded-xl p-5 mb-3 space-y-2 shrink-0">
            <div className="flex justify-between text-xs text-gray-600 uppercase tracking-wider">
              <span>No privacy (p = 0)</span>
              <span>High privacy (p = 1)</span>
            </div>
            <input type="range" min="0" max="100" step="1" value={sliderVal}
              onChange={e => setSliderVal(Number(e.target.value))}
              className="w-full accent-cispa cursor-pointer" />
            <div className="flex items-center gap-3">
              <span className="text-5xl font-mono font-bold text-cispa-light">
                p = {p.toFixed(2)}
              </span>
              <span className="text-base text-gray-500 flex-1 italic">{privacyLabel}</span>
              <button onClick={() => setSeed(s => s+1)}
                className="text-xs text-gray-600 hover:text-gray-400 border border-gray-800 rounded px-2 py-1 transition-colors">
                ↺ resample
              </button>
            </div>
          </div>

          {/* Two salary cards: D exact | D+x noisy */}
          <div className="grid grid-cols-2 gap-3 mb-3 shrink-0">
            <div className="border border-gray-800 rounded-xl p-5 flex flex-col justify-center">
              <div className="text-base font-bold text-gray-300 uppercase tracking-wider mb-1">D - 15 employees</div>
              <div className="font-mono text-4xl font-bold text-gray-100">{def.fmt(exactDMean)}</div>
              <div className="text-sm text-gray-600 mt-1.5 font-mono">Exact - no noise added</div>
            </div>
            <div className="border border-gray-800 rounded-xl p-5 flex flex-col justify-center">
              <div className="text-base font-bold text-gray-300 uppercase tracking-wider mb-1">D+x - 16 employees</div>
              <div className="font-mono text-4xl font-bold text-gray-100">{def.fmt(noisyDXMean)}</div>
              <div className="text-sm text-gray-700 mt-1.5 font-mono">
                true: {def.fmt(STATS_DX.avgSalary)}
                {' · noise: '}
                {epsilon === Infinity ? '±$0' : `±${def.fmt(noiseScale)}`}
              </div>
            </div>
          </div>

          {/* Inferred salary + classification */}
          <div className={`border rounded-xl p-5 mb-3 shrink-0 transition-all duration-500 ${
            recoveryStatus === 'fail'     ? 'border-red-800/60 bg-red-950/15' :
            recoveryStatus === 'partial'  ? 'border-amber-800/60 bg-amber-950/15' :
                                            'border-green-800/60 bg-green-950/15'}`}>
            <div className="text-sm text-gray-600 uppercase tracking-wider mb-2">
              Analyst computes: 16 × mean(D+x) − 15 × mean(D)
            </div>
            <div className="flex items-center justify-between gap-4">
              <div>
                <div className="font-mono text-4xl font-bold text-gray-100">{inferredFmt}</div>
                <div className="text-sm text-gray-500 mt-1 font-mono">
                  true: $200,000 · error: {def.fmt(salaryError)}
                </div>
              </div>
              <div className={`shrink-0 text-base font-semibold px-5 py-3 rounded-lg border transition-all duration-500 ${
                recoveryStatus === 'fail'    ? 'border-red-700    bg-red-950/50    text-red-300' :
                recoveryStatus === 'partial' ? 'border-amber-700  bg-amber-950/50  text-amber-300' :
                                               'border-green-700  bg-green-950/50  text-green-300'}`}>
                {recoveryStatus === 'fail'    ? '❌ Salary recovered' :
                 recoveryStatus === 'partial' ? '⚠️ Rough estimate' :
                                                '✓ Protected'}
              </div>
            </div>
            <div className={`text-sm mt-2 ${
              recoveryStatus === 'fail'    ? 'text-red-400/70' :
              recoveryStatus === 'partial' ? 'text-amber-400/70' :
                                             'text-green-400/70'}`}>
              {recoveryStatus === 'fail'
                ? 'Noise too small - the analyst can still recover x\'s salary.'
                : recoveryStatus === 'partial'
                ? 'Salary range still visible - x\'s bracket can be guessed.'
                : 'Noise large enough - x\'s true salary is hidden.'}
            </div>
          </div>

          {/* Distribution visualization */}
          <SalaryDistribution epsilon={epsilon} noiseScale={noiseScale} inferredSalary={inferredSalary} />

          <div className="shrink-0 flex items-center gap-4">
            <button onClick={onRestart}
              className="text-sm text-gray-700 hover:text-gray-500 transition-colors">
              ← Start over
            </button>
            {showAdvanced && (
              <button onClick={onContinue}
                className="ml-auto px-5 py-2.5 rounded-xl bg-cispa hover:bg-cispa-light text-sm font-medium transition-colors">
                See it in a trained ML model →
              </button>
            )}
          </div>
        </div>
      );
    }

    // ─── Phase 4: ML model ───────────────────────────────────────────────────
    function PhaseML({ onContinue, onRestart, goToStep, showAdvanced, onToggleAdvanced }) {
      // p = 0 (left) = no privacy, p = 1 (right) = high privacy
      // ε = 10^(1 - p*2): p=0→∞, p=0.5→1, p=1→0.1 — full range for text completion stages
      const [sliderVal, setSliderVal] = useState(0);
      const p       = sliderVal / 100;
      const epsilon = p === 0 ? Infinity : Math.pow(10, 1 - p * 2);

      const [selectedId, setSelectedId] = useState(DATABASE_DX[0].id);
      const emp = DATABASE_DX.find(r => r.id === selectedId);
      const completion = getCompletion(emp, epsilon);

      const protection =
        p === 0  ? 'No protection - model fully memorizes training data' :
        p < 0.3  ? 'Minimal protection - significant leakage visible' :
        p < 0.5  ? 'Weak protection - some patterns still extractable' :
        p < 0.7  ? 'Moderate protection - extraction becoming noisy' :
                   'Strong protection - both attacks fail';

      return (
        <div className="h-screen overflow-hidden flex flex-col max-w-5xl mx-auto px-6 py-3">
          <StepBar current={3} onStep={goToStep} showAdvanced={showAdvanced} onToggleAdvanced={onToggleAdvanced} />
          <h2 className="text-2xl font-bold mb-0.5 shrink-0">ML model trained on the same data</h2>
          <p className="text-sm text-gray-500 mb-3 shrink-0">
            Without privacy protection, a model trained on D+x leaks two ways: membership inference (did this fact appear in training?)
            and verbatim extraction (can we recover the value?). Increase privacy to see DP-SGD shut both down.
          </p>

          {/* Slider */}
          <div className="border border-gray-800 rounded-xl p-3 mb-3 space-y-1.5 shrink-0">
            <div className="flex justify-between text-[10px] text-gray-600 uppercase tracking-wider">
              <span>No privacy (p = 0)</span>
              <span>High privacy (p = 1)</span>
            </div>
            <input type="range" min="0" max="100" step="1" value={sliderVal}
              onChange={e => setSliderVal(Number(e.target.value))}
              className="w-full accent-cispa cursor-pointer" />
            <div className="flex items-center gap-3">
              <span className="text-2xl font-mono font-bold text-cispa-light">
                p = {p.toFixed(2)}
              </span>
              <span className="text-sm text-gray-500 flex-1 italic">{protection}</span>
            </div>
          </div>

          <div className="flex-1 grid grid-cols-2 gap-4 min-h-0">
            {/* Left: Membership inference */}
            <div className="border border-gray-800 rounded-xl overflow-hidden flex flex-col min-h-0">
              <div className="bg-gray-900 px-4 py-2.5 border-b border-gray-800 shrink-0">
                <span className="text-sm font-semibold text-gray-200">Membership inference</span>
                <span className="text-xs text-gray-600 ml-2">- did this fact appear in training?</span>
              </div>
              <div className="flex-1 overflow-y-auto p-3 space-y-2">
                {MI_CARDS.map(card => {
                  const score = membershipScore(card.baseScore, epsilon);
                  const pct   = Math.round(score * 100);
                  const high  = score > 0.65;
                  const low   = score < 0.35;
                  return (
                    <div key={card.id} className={`rounded-lg border p-3 ${
                      card.scary && high ? 'border-red-800/60 bg-red-950/20' : 'border-gray-800 bg-gray-900/30'}`}>
                      <div className="flex items-start justify-between gap-2 mb-2">
                        <span className={`text-sm font-mono ${card.scary && high ? 'text-red-300' : 'text-gray-300'}`}>
                          "{card.text}"
                        </span>
                        {card.scary && (
                          <span className="shrink-0 text-[9px] bg-amber-900/50 text-amber-400 border border-amber-800/50 rounded px-1.5 py-0.5">
                            x's record
                          </span>
                        )}
                      </div>
                      <div className="flex items-center gap-2">
                        <div className="flex-1 h-2 bg-gray-800 rounded-full overflow-hidden">
                          <div className={`h-full rounded-full transition-all duration-500 ${
                            high ? 'bg-red-500' : low ? 'bg-green-600' : 'bg-amber-500'}`}
                            style={{ width: `${pct}%` }} />
                        </div>
                        <span className={`text-xs font-mono font-bold w-8 text-right ${
                          high ? 'text-red-400' : low ? 'text-green-400' : 'text-amber-400'}`}>
                          {score.toFixed(2)}
                        </span>
                      </div>
                      <div className="flex justify-between mt-1">
                        <span className="text-[9px] text-gray-700">0 - non-member</span>
                        <span className="text-[9px] text-gray-700">1 - member</span>
                      </div>
                    </div>
                  );
                })}
                <p className="text-xs text-gray-600 italic pt-1">
                  Scores near 0.5 = indistinguishable from non-member. DP-SGD pushes all scores there.
                </p>
              </div>
            </div>

            {/* Right: Verbatim extraction */}
            <div className="border border-gray-800 rounded-xl overflow-hidden flex flex-col min-h-0">
              <div className="bg-gray-900 px-4 py-2.5 border-b border-gray-800 shrink-0">
                <span className="text-sm font-semibold text-gray-200">Verbatim memorization</span>
                <span className="text-xs text-gray-600 ml-2">- can the model complete this text?</span>
              </div>
              <div className="flex-1 p-4 flex flex-col gap-3 overflow-y-auto">
                <div className="shrink-0">
                  <label className="text-xs text-gray-600 uppercase tracking-wider block mb-1.5">
                    Select employee
                  </label>
                  <select value={selectedId} onChange={e => setSelectedId(Number(e.target.value))}
                    className="w-full bg-gray-900 border border-gray-700 rounded-lg px-3 py-2.5 text-sm text-gray-200 focus:outline-none focus:border-cispa">
                    {DATABASE_DX.map(r => (
                      <option key={r.id} value={r.id}>
                        {r.name}{r.id === 16 ? ' ← x' : ''}
                      </option>
                    ))}
                  </select>
                </div>
                <div className="rounded-lg border border-gray-800 overflow-hidden font-mono text-sm" style={{minHeight:'160px'}}>
                  <div className="bg-gray-900/80 px-4 py-3 border-b border-gray-800">
                    <div className="text-[9px] text-gray-600 uppercase tracking-wider mb-1">Prompt</div>
                    <span className="text-gray-500">Complete the HR record for {emp.name}:</span>
                  </div>
                  <div className={`px-4 py-4 transition-colors duration-500 ${
                    completion.quality === 'exact'  ? 'bg-red-950/15' :
                    completion.quality === 'noisy'  ? 'bg-amber-950/15' :
                                                      'bg-green-950/15'}`}>
                    <div className="text-[9px] text-gray-600 uppercase tracking-wider mb-2">Model output</div>
                    <p className="text-gray-400 leading-relaxed text-base">
                      <span>"They work in </span>
                      <CompletionChip text={completion.dept} quality={completion.quality} />
                      <span>, earning </span>
                      <CompletionChip text={completion.salary} quality={completion.quality} />
                      <span> per year. Last year they took </span>
                      <CompletionChip text={`${completion.sick} sick days`} quality={completion.quality} />
                      <span>."</span>
                    </p>
                  </div>
                </div>
                <div className={`shrink-0 rounded-lg px-4 py-3 text-sm border text-center transition-colors duration-500 ${
                  completion.quality === 'exact'
                    ? 'border-red-800/50   bg-red-950/20   text-red-300'
                    : completion.quality === 'noisy'
                    ? 'border-amber-800/50 bg-amber-950/20 text-amber-300'
                    : 'border-green-800/50 bg-green-950/20 text-green-300'}`}>
                  {completion.quality === 'exact'
                    ? 'Verbatim extraction - training data reproduced exactly'
                    : completion.quality === 'noisy'
                    ? 'Coherent but wrong - plausible text, incorrect values'
                    : 'Protected - DP noise makes output incoherent gibberish'}
                </div>
                {emp.id === 16 && completion.quality !== 'protected' && (
                  <div className="shrink-0 border border-amber-800/50 bg-amber-950/20 rounded-lg p-3 text-sm text-amber-300">
                    <strong>Morgan X.</strong> - x's record. At high ε the model reproduces their $200,000 salary exactly. Slide left to protect it.
                  </div>
                )}
              </div>
            </div>
          </div>

          <div className="shrink-0 pt-3 flex items-center gap-4">
            <button onClick={onRestart}
              className="text-sm text-gray-700 hover:text-gray-500 transition-colors">
              ← Start over
            </button>
            <button onClick={onContinue}
              className="ml-auto px-5 py-2.5 rounded-xl bg-cispa hover:bg-cispa-light text-sm font-medium transition-colors">
              Why this matters for AI research →
            </button>
          </div>
        </div>
      );
    }

    // ─── Phase 5: Research ───────────────────────────────────────────────────
    function PhaseResearch({ onRestart, goToStep, showAdvanced, onToggleAdvanced }) {
      return (
        <div className="h-screen overflow-hidden flex flex-col max-w-4xl mx-auto px-6 py-3">
          <StepBar current={4} onStep={goToStep} showAdvanced={showAdvanced} onToggleAdvanced={onToggleAdvanced} />
          <h2 className="text-2xl font-bold mb-0.5 shrink-0">From HR databases to foundation models</h2>
          <p className="text-sm text-gray-500 mb-3 shrink-0">
            The same privacy risk - at the scale of the entire internet.
          </p>
          <div className="flex-1 grid grid-cols-2 gap-3 min-h-0">
            <div className="border border-gray-800 rounded-xl p-5 flex items-start gap-4">
              <span className="text-3xl shrink-0">🌐</span>
              <div>
                <h3 className="font-semibold text-base text-gray-100 mb-2">Foundation models train on everything</h3>
                <p className="text-sm text-gray-400 leading-relaxed">
                  GPT-4, Llama, Gemini - trained on trillions of tokens from the open web, including medical
                  forums, legal documents, financial records, and private communications. The
                  "x joins the database" problem now involves billions of individuals, none of whom consented.
                </p>
              </div>
            </div>
            <div className="border border-gray-800 rounded-xl p-5 flex items-start gap-4">
              <span className="text-3xl shrink-0">🔓</span>
              <div>
                <h3 className="font-semibold text-base text-gray-100 mb-2">Memorization attacks are real and proven</h3>
                <p className="text-sm text-gray-400 leading-relaxed">
                  Carlini et al. (2021) extracted verbatim text from GPT-2 - names, phone numbers, addresses -
                  using only public API access. The text completion exercise above is a simplified version
                  of this exact attack. Membership inference regularly exceeds 80% accuracy.
                </p>
              </div>
            </div>
            <div className="border border-gray-800 rounded-xl p-5 flex items-start gap-4">
              <span className="text-3xl shrink-0">⚖️</span>
              <div>
                <h3 className="font-semibold text-base text-gray-100 mb-2">DP-SGD works - but at a steep cost</h3>
                <p className="text-sm text-gray-400 leading-relaxed">
                  Differentially private training (Abadi et al. 2016) clips and noises gradients during
                  backpropagation, providing formal guarantees. But at the scale of large foundation models
                  the utility loss is severe, and the correct privacy budget ε remains an open question.
                </p>
              </div>
            </div>
            <div className="border border-cispa-dim/80 bg-cispa-dim/30 rounded-xl p-5 flex items-start gap-4">
              <span className="text-3xl shrink-0">🔬</span>
              <div>
                <h3 className="font-semibold text-base text-cispa-light mb-2">The open problem</h3>
                <p className="text-sm text-gray-400 leading-relaxed">
                  Can we fine-tune large foundation models on sensitive data while providing meaningful DP
                  guarantees without destroying usefulness? This requires new theory on the privacy-utility
                  frontier, tighter composition bounds, and better auditing tools.
                </p>
                <div className="mt-3 flex flex-wrap gap-2">
                  {['DP fine-tuning', 'Privacy auditing', 'Tight composition', 'DP synthetic data', 'Membership inference'].map(t => (
                    <span key={t} className="text-xs bg-cispa-dim/70 border border-cispa-dim/80 text-cispa rounded-full px-2.5 py-1">
                      {t}
                    </span>
                  ))}
                </div>
              </div>
            </div>
          </div>
          <div className="shrink-0 pt-3">
            <button onClick={onRestart}
              className="text-sm text-gray-700 hover:text-gray-500 transition-colors">
              ← Start over
            </button>
          </div>
        </div>
      );
    }

    // ─── App ─────────────────────────────────────────────────────────────────
    function App() {
      const [phase, setPhase] = useState('landing');
      const [isDark, setIsDark] = useState(true);
      const [showAdvanced, setShowAdvanced] = useState(true);
      const toggleDark = () => setIsDark(d => !d);
      const onToggleAdvanced = () => setShowAdvanced(v => {
        // If hiding advanced tabs while on an advanced phase, go back to DP
        if (v && (phase === 'ml' || phase === 'research')) setPhase('dp');
        return !v;
      });

      useEffect(() => {
        document.documentElement.classList.toggle('light', !isDark);
      }, [isDark]);

      const PHASES = ['compare', 'mcqa', 'dp', 'ml', 'research'];
      const goToStep = i => {
        // Prevent navigating to advanced phases when hidden
        if (!showAdvanced && i >= 3) return;
        setPhase(PHASES[i]);
      };

      const shared = { goToStep, showAdvanced, onToggleAdvanced };

      let content;
      if      (phase==='landing')  content = <Landing         onStart={() => setPhase('compare')} />;
      else if (phase==='compare')  content = <PhaseCompare    onContinue={() => setPhase('mcqa')}     {...shared} />;
      else if (phase==='mcqa')     content = <PhaseMCQA       onContinue={() => setPhase('dp')}       {...shared} />;
      else if (phase==='dp')       content = <PhaseDP         onContinue={() => setPhase('ml')} onRestart={() => setPhase('landing')} {...shared} />;
      else if (phase==='ml')       content = <PhaseML         onContinue={() => setPhase('research')} onRestart={() => setPhase('landing')} {...shared} />;
      else if (phase==='research') content = <PhaseResearch   onRestart={() => setPhase('landing')}   {...shared} />;

      return (
        <ThemeCtx.Provider value={{ isDark, toggleDark }}>
          {content}
        </ThemeCtx.Provider>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
