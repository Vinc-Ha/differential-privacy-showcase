<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Experience Differential Privacy</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode: 'class', theme: { extend: {} } }</script>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="dark bg-gray-950 text-gray-100 min-h-screen antialiased">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useMemo } = React;

    // ─── Dataset ──────────────────────────────────────────────────────────────
    const DATABASE_D = [
      { id:1,  name:'Alice M.',   dept:'Engineering', salary:95000,  sick:4 },
      { id:2,  name:'Bob K.',     dept:'Engineering', salary:88000,  sick:6 },
      { id:3,  name:'Eve P.',     dept:'Engineering', salary:105000, sick:3 },
      { id:4,  name:'Henry J.',   dept:'Engineering', salary:91000,  sick:5 },
      { id:5,  name:'Isabel R.',  dept:'Engineering', salary:98000,  sick:4 },
      { id:6,  name:'James T.',   dept:'Engineering', salary:82000,  sick:7 },
      { id:7,  name:'Carol T.',   dept:'Sales',       salary:72000,  sick:8 },
      { id:8,  name:'Frank N.',   dept:'Sales',       salary:78000,  sick:7 },
      { id:9,  name:'Karen L.',   dept:'Sales',       salary:68000,  sick:9 },
      { id:10, name:'Leo B.',     dept:'Sales',       salary:75000,  sick:6 },
      { id:11, name:'Mia S.',     dept:'Sales',       salary:71000,  sick:8 },
      { id:12, name:'David L.',   dept:'HR',          salary:65000,  sick:5 },
      { id:13, name:'Grace H.',   dept:'HR',          salary:62000,  sick:9 },
      { id:14, name:'Nina P.',    dept:'HR',          salary:67000,  sick:6 },
      { id:15, name:'Oscar M.',   dept:'HR',          salary:63000,  sick:7 },
    ];

    // x's individual record is hidden from the analyst — revealed only after the quiz
    const PERSON_X = { id:16, name:'Morgan X.', dept:'Engineering', salary:145000, sick:2 };
    const DATABASE_DX = [...DATABASE_D, PERSON_X];

    // ─── Statistics ───────────────────────────────────────────────────────────
    function computeStats(data) {
      const n = data.length;
      return {
        avgSalary: data.reduce((a, r) => a + r.salary, 0) / n,
        avgSick:   data.reduce((a, r) => a + r.sick,   0) / n,
        engCount:  data.filter(r => r.dept === 'Engineering').length,
        maxSalary: Math.max(...data.map(r => r.salary)),
      };
    }

    const STATS_D  = computeStats(DATABASE_D);   // avgSalary≈78667, avgSick≈6.27, eng=6, max=105000
    const STATS_DX = computeStats(DATABASE_DX);  // avgSalary≈82813, avgSick≈6.00, eng=7, max=145000

    const STAT_DEFS = [
      { key:'avgSalary', label:'Mean salary',          icon:'💼',
        fmt: v => `$${Math.round(v).toLocaleString()}`,
        sensitivity: 145000 / DATABASE_DX.length },
      { key:'avgSick',   label:'Mean sick days / yr',  icon:'🏥',
        fmt: v => v.toFixed(2),
        sensitivity: 30 / DATABASE_DX.length },
      { key:'engCount',  label:'Engineering headcount', icon:'👥',
        fmt: v => String(Math.round(v)),
        sensitivity: 1 },
      { key:'maxSalary', label:'Highest salary',        icon:'📈',
        fmt: v => `$${Math.round(v).toLocaleString()}`,
        sensitivity: 145000 },
    ];

    // ─── DP Math ──────────────────────────────────────────────────────────────
    function laplaceSample(b) {
      const u = Math.random() - 0.5;
      return -b * Math.sign(u) * Math.log(1 - 2 * Math.abs(u));
    }
    function sampleNoisyStats(trueStats, epsilon) {
      return Object.fromEntries(
        STAT_DEFS.map(def => [def.key, trueStats[def.key] + laplaceSample(def.sensitivity / epsilon)])
      );
    }

    // ─── Quiz ─────────────────────────────────────────────────────────────────
    const QUESTIONS = [
      {
        key: 'salary',
        q: 'Mean salary rose by ~$4,150 when x joined.',
        prompt: "What is x's salary?",
        options: ['Around $79k — near the group average', 'Between $90k and $110k', 'Well above $130k'],
        correct: 2,
        math: `x = 16 × $82,813 − 15 × $78,667 = $1,325,008 − $1,180,005 = $145,003`,
      },
      {
        key: 'dept',
        q: 'Engineering headcount: 6 → 7. Sales and HR unchanged.',
        prompt: "Which department does x work in?",
        options: ['Sales or HR', 'Engineering', 'Cannot determine'],
        correct: 1,
        math: '+1 in Engineering, 0 elsewhere — the count query pinpoints x\'s department exactly.',
      },
      {
        key: 'sick',
        q: 'Mean sick days fell from 6.27 to 6.00.',
        prompt: "How does x compare?",
        options: ['x takes more sick days than average', 'x is close to average', 'x takes far fewer sick days'],
        correct: 2,
        math: `x = 16 × 6.00 − 15 × 6.27 = 96 − 94.05 ≈ 2 days/yr — far below the group average.`,
      },
    ];

    // ─── Step bar ─────────────────────────────────────────────────────────────
    function StepBar({ current }) {
      const steps = ['D vs D+x', 'Infer x', 'DP'];
      return (
        <div className="flex items-center gap-1 mb-8">
          {steps.map((s, i) => (
            <React.Fragment key={s}>
              <div className={`flex items-center gap-1.5 text-xs ${i === current ? 'text-indigo-300' : i < current ? 'text-gray-600' : 'text-gray-700'}`}>
                <span className={`w-5 h-5 rounded-full flex items-center justify-center text-[10px] font-bold ${
                  i === current ? 'bg-indigo-600 text-white' :
                  i < current  ? 'bg-gray-800 text-gray-500' :
                                 'border border-gray-800 text-gray-700'}`}>{i+1}</span>
                <span className="hidden sm:inline">{s}</span>
              </div>
              {i < steps.length-1 && <div className={`flex-1 h-px mx-1 ${i < current ? 'bg-gray-700' : 'bg-gray-800'}`} />}
            </React.Fragment>
          ))}
        </div>
      );
    }

    // ─── Landing ──────────────────────────────────────────────────────────────
    function Landing({ onStart }) {
      return (
        <div className="min-h-screen flex flex-col items-center justify-center text-center px-8 gap-6">
          <h1 className="text-4xl sm:text-5xl font-bold max-w-2xl leading-tight">
            What can aggregate statistics<br className="hidden sm:block" />reveal about you?
          </h1>
          <p className="text-gray-400 max-w-sm text-sm">
            Knowing the mean salary before and after you join a database
            is enough to infer your exact salary.
          </p>
          <button onClick={onStart}
            className="px-8 py-3 rounded-lg bg-indigo-600 hover:bg-indigo-500 font-medium transition-colors">
            Show me
          </button>
        </div>
      );
    }

    // ─── Phase 1: D vs D+x ───────────────────────────────────────────────────
    const DEPT_COLORS = {
      Engineering: 'text-indigo-400',
      Sales:       'text-emerald-400',
      HR:          'text-amber-400',
    };

    function PhaseCompare({ onContinue }) {
      const [xAdded, setXAdded] = useState(false);

      return (
        <div className="max-w-5xl mx-auto px-4 sm:px-6 py-8">
          <StepBar current={0} />

          {/* Header */}
          <div className="flex items-center justify-between mb-4">
            <div>
              <h2 className="text-xl font-bold">
                Database <span className="font-mono text-indigo-300">{xAdded ? 'D+x' : 'D'}</span>
                <span className="text-gray-600 text-sm font-normal ml-2">— {xAdded ? 16 : 15} records</span>
              </h2>
              <p className="text-xs text-gray-500 mt-0.5">
                The analyst sees only the aggregate queries on the right — never individual rows.
              </p>
            </div>
            {!xAdded && (
              <button onClick={() => setXAdded(true)}
                className="shrink-0 px-4 py-2 rounded-lg border border-dashed border-indigo-600/60 hover:border-indigo-400 hover:bg-indigo-950/30 text-indigo-400 hover:text-indigo-300 text-sm font-medium transition-all">
                + x joins →
              </button>
            )}
          </div>

          <div className="grid grid-cols-1 lg:grid-cols-5 gap-4">
            {/* Table — 3 cols */}
            <div className="lg:col-span-3 border border-gray-800 rounded-xl overflow-hidden">
              <div className="overflow-y-auto" style={{ maxHeight: '420px' }}>
                <table className="w-full text-xs">
                  <thead className="sticky top-0 bg-gray-900 text-gray-500">
                    <tr>
                      <th className="px-3 py-2.5 text-left font-medium">Name</th>
                      <th className="px-3 py-2.5 text-left font-medium">Dept</th>
                      <th className="px-3 py-2.5 text-right font-medium">Salary</th>
                      <th className="px-3 py-2.5 text-right font-medium">Sick days</th>
                    </tr>
                  </thead>
                  <tbody className="bg-gray-900/30">
                    {DATABASE_D.map(r => (
                      <tr key={r.id} className="border-t border-gray-800/60 text-gray-300 hover:bg-gray-800/30">
                        <td className="px-3 py-1.5 font-mono">{r.name}</td>
                        <td className={`px-3 py-1.5 ${DEPT_COLORS[r.dept]}`}>{r.dept}</td>
                        <td className="px-3 py-1.5 text-right">${r.salary.toLocaleString()}</td>
                        <td className="px-3 py-1.5 text-right">{r.sick}</td>
                      </tr>
                    ))}
                    {xAdded && (
                      <tr className="border-t-2 border-indigo-500 bg-indigo-950/50">
                        <td className="px-3 py-2 font-mono text-indigo-300 font-semibold">x</td>
                        <td className="px-3 py-2 text-indigo-800 italic text-[10px]">private</td>
                        <td className="px-3 py-2 text-right text-indigo-800 italic text-[10px]">private</td>
                        <td className="px-3 py-2 text-right text-indigo-800 italic text-[10px]">private</td>
                      </tr>
                    )}
                  </tbody>
                </table>
              </div>
            </div>

            {/* Stats — 2 cols */}
            <div className="lg:col-span-2 space-y-2">
              {STAT_DEFS.map(def => {
                const dVal    = STATS_D[def.key];
                const dxVal   = STATS_DX[def.key];
                const delta   = dxVal - dVal;
                const changed = xAdded && delta !== 0;
                const up      = delta > 0;
                return (
                  <div key={def.key} className={`border rounded-xl px-4 py-3 transition-all duration-500 ${
                    changed ? 'border-amber-700/50 bg-amber-950/20' : 'border-gray-800 bg-gray-900/40'}`}>
                    <div className="text-[10px] text-gray-600 uppercase tracking-wider mb-1">
                      {def.icon} {def.label}
                    </div>
                    <div className="flex items-end justify-between">
                      <span className="font-mono text-lg font-bold">
                        {def.fmt(xAdded ? dxVal : dVal)}
                      </span>
                      {changed && (
                        <span className={`text-xs font-mono font-bold ${up ? 'text-red-400' : 'text-emerald-400'}`}>
                          {up ? '▲' : '▼'} {def.fmt(Math.abs(delta))}
                        </span>
                      )}
                    </div>
                  </div>
                );
              })}

              {xAdded && (
                <button onClick={onContinue}
                  className="w-full py-2.5 rounded-xl bg-indigo-600 hover:bg-indigo-500 text-sm font-medium transition-colors mt-2">
                  What does this reveal about x? →
                </button>
              )}
            </div>
          </div>
        </div>
      );
    }

    // ─── Phase 2: Quiz ────────────────────────────────────────────────────────
    function PhaseMCQA({ onContinue }) {
      const [guesses,  setGuesses]  = useState({});
      const [revealed, setRevealed] = useState(false);
      const allAnswered = QUESTIONS.every(q => guesses[q.key] !== undefined);
      const score = QUESTIONS.filter(q => guesses[q.key] === q.correct).length;

      return (
        <div className="max-w-2xl mx-auto px-4 sm:px-6 py-8">
          <StepBar current={1} />
          <h2 className="text-xl font-bold mb-1">Infer x's profile</h2>
          <p className="text-xs text-gray-500 mb-6">
            The analyst sees only how the statistics shifted. What can they deduce?
          </p>

          <div className="space-y-4">
            {QUESTIONS.map((q, qi) => {
              const g = guesses[q.key];
              return (
                <div key={q.key} className="border border-gray-800 rounded-xl overflow-hidden">
                  {/* Observed change — the "clue" */}
                  <div className="bg-gray-900 px-4 py-2.5 border-b border-gray-800">
                    <span className="text-[10px] text-gray-600 uppercase tracking-wider mr-2">Observed</span>
                    <span className="text-xs font-mono text-amber-300">{q.q}</span>
                  </div>
                  {/* Question */}
                  <div className="px-4 pt-3 pb-1">
                    <p className="text-sm font-medium text-gray-200 mb-2">{q.prompt}</p>
                    <div className="space-y-1.5">
                      {q.options.map((opt, oi) => {
                        const chosen  = g === oi;
                        const correct = revealed && oi === q.correct;
                        const wrong   = revealed && chosen && oi !== q.correct;
                        return (
                          <button key={oi} onClick={() => !revealed && setGuesses(gs => ({ ...gs, [q.key]: oi }))}
                            className={`w-full text-left px-3 py-2 rounded-lg border text-sm transition-colors ${
                              correct ? 'border-green-700 bg-green-950/40 text-green-300' :
                              wrong   ? 'border-red-800  bg-red-950/30  text-red-300' :
                              chosen  ? 'border-indigo-600 bg-indigo-950/40 text-indigo-200' :
                                        'border-gray-800 text-gray-400 hover:border-gray-600'
                            } ${revealed ? 'cursor-default' : 'cursor-pointer'}`}>
                            <span className="text-[10px] text-gray-600 font-mono mr-2">{String.fromCharCode(97+oi)})</span>
                            {opt}
                            {correct && ' ✓'}{wrong && ' ✗'}
                          </button>
                        );
                      })}
                    </div>
                  </div>
                  {/* Math explanation */}
                  {revealed && (
                    <div className="px-4 pb-3 pt-2">
                      <p className="text-[11px] text-gray-500 font-mono bg-gray-900/60 rounded px-2.5 py-1.5">
                        {q.math}
                      </p>
                    </div>
                  )}
                </div>
              );
            })}
          </div>

          <div className="mt-4 space-y-3">
            {allAnswered && !revealed && (
              <button onClick={() => setRevealed(true)}
                className="w-full py-2.5 rounded-xl bg-indigo-600 hover:bg-indigo-500 text-sm font-medium transition-colors">
                Check answers
              </button>
            )}
            {revealed && (
              <>
                <div className="border border-gray-800 rounded-xl p-4 flex items-center justify-between">
                  <div>
                    <span className="text-2xl font-bold">{score}/{QUESTIONS.length}</span>
                    <span className="text-xs text-gray-500 ml-2">
                      {score===3 ? 'Full profile recovered.' : 'Partial profile recovered.'}
                    </span>
                  </div>
                  <div className="text-right text-xs font-mono space-y-0.5">
                    <div className="text-indigo-300 font-semibold">{PERSON_X.name}</div>
                    <div className="text-gray-400">{PERSON_X.dept} · ${PERSON_X.salary.toLocaleString()} · {PERSON_X.sick} sick days/yr</div>
                  </div>
                </div>
                <button onClick={onContinue}
                  className="w-full py-2.5 rounded-xl bg-indigo-600 hover:bg-indigo-500 text-sm font-medium transition-colors">
                  How does DP protect x? →
                </button>
              </>
            )}
          </div>
        </div>
      );
    }

    // ─── Phase 3: DP ─────────────────────────────────────────────────────────
    function PhaseDP({ onRestart }) {
      const sliderToEps = v => Math.pow(10, -1 + (v / 100) * 2);
      const [sliderVal, setSliderVal] = useState(50);
      const [seed, setSeed] = useState(0);
      const epsilon = sliderToEps(sliderVal);

      const noisyD  = useMemo(() => sampleNoisyStats(STATS_D,  epsilon), [epsilon, seed]);
      const noisyDX = useMemo(() => sampleNoisyStats(STATS_DX, epsilon), [epsilon, seed]);

      const rows = STAT_DEFS.map(def => {
        const scale   = def.sensitivity / epsilon;
        const vD      = noisyD[def.key];
        const vDX     = noisyDX[def.key];
        const obsDelta = vDX - vD;
        const hidden  = Math.abs(obsDelta) <= 1.5 * scale;
        return { def, vD, vDX, obsDelta, trueDelta: STATS_DX[def.key] - STATS_D[def.key], scale, hidden };
      });

      const hiddenCount = rows.filter(r => r.hidden).length;
      const protection =
        epsilon < 0.5 ? 'Strong — all signals swamped by noise' :
        epsilon < 2   ? 'Moderate — most signals hidden' :
        epsilon < 5   ? 'Weak — signals often detectable' :
                        'Minimal — noise barely masks differences';

      return (
        <div className="max-w-3xl mx-auto px-4 sm:px-6 py-8">
          <StepBar current={2} />
          <h2 className="text-xl font-bold mb-1">Differential privacy</h2>
          <p className="text-xs text-gray-500 mb-6">
            Every query answer is perturbed with Laplace noise scaled to ε.
            At small ε, D and D+x become indistinguishable.
          </p>

          {/* Slider */}
          <div className="border border-gray-800 rounded-xl p-4 mb-4 space-y-2">
            <div className="flex justify-between text-[10px] text-gray-600 uppercase tracking-wider">
              <span>← high privacy (ε = 0.1)</span>
              <span>low privacy (ε = 10) →</span>
            </div>
            <input type="range" min="0" max="100" step="1" value={sliderVal}
              onChange={e => setSliderVal(Number(e.target.value))}
              className="w-full accent-indigo-500 cursor-pointer" />
            <div className="flex items-center gap-3">
              <span className="text-2xl font-mono font-bold text-indigo-300">ε = {epsilon.toFixed(2)}</span>
              <span className="text-xs text-gray-500 flex-1 italic">{protection}</span>
              <button onClick={() => setSeed(s => s+1)}
                className="text-[11px] text-gray-600 hover:text-gray-400 border border-gray-800 rounded px-2 py-1 transition-colors">
                ↺ resample
              </button>
            </div>
          </div>

          {/* Table */}
          <div className="border border-gray-800 rounded-xl overflow-hidden mb-4">
            <table className="w-full text-xs">
              <thead className="bg-gray-900 text-gray-600">
                <tr>
                  <th className="px-3 py-2.5 text-left font-medium">Statistic</th>
                  <th className="px-3 py-2.5 text-right font-mono">D + noise</th>
                  <th className="px-3 py-2.5 text-right font-mono">D+x + noise</th>
                  <th className="px-3 py-2.5 text-right">Observed Δ</th>
                  <th className="px-3 py-2.5 text-right">Noise scale</th>
                  <th className="px-3 py-2.5 text-center">Hidden?</th>
                </tr>
              </thead>
              <tbody>
                {rows.map(({ def, vD, vDX, obsDelta, trueDelta, scale, hidden }) => (
                  <tr key={def.key} className="border-t border-gray-800/60 hover:bg-gray-900/30">
                    <td className="px-3 py-2.5 text-gray-400">{def.icon} {def.label}</td>
                    <td className="px-3 py-2.5 text-right font-mono text-gray-400">{def.fmt(vD)}</td>
                    <td className="px-3 py-2.5 text-right font-mono text-gray-400">{def.fmt(vDX)}</td>
                    <td className={`px-3 py-2.5 text-right font-mono font-semibold ${obsDelta>=0?'text-red-400':'text-emerald-400'}`}>
                      {obsDelta>=0?'+':'−'}{def.fmt(Math.abs(obsDelta))}
                    </td>
                    <td className="px-3 py-2.5 text-right font-mono text-gray-600">
                      ±{def.fmt(scale)}
                    </td>
                    <td className="px-3 py-2.5 text-center">
                      <span className={`inline-block px-2 py-0.5 rounded-full text-[10px] font-semibold border ${
                        hidden
                          ? 'text-green-300 bg-green-950/60 border-green-900'
                          : 'text-red-300  bg-red-950/60  border-red-900'}`}>
                        {hidden ? 'Yes' : 'No'}
                      </span>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>

          {/* Summary pill */}
          <div className={`rounded-xl p-3 mb-6 text-sm text-center font-medium border transition-colors ${
            hiddenCount === 4 ? 'bg-green-950/30 border-green-900 text-green-300' :
            hiddenCount >= 2  ? 'bg-amber-950/30 border-amber-900 text-amber-300' :
                                'bg-red-950/30   border-red-900   text-red-300'}`}>
            {hiddenCount}/4 statistics hidden from the analyst at ε = {epsilon.toFixed(2)}
          </div>

          {/* Formal guarantee */}
          <div className="border border-indigo-900/50 bg-indigo-950/20 rounded-xl p-4 mb-6">
            <div className="text-[10px] text-indigo-600 uppercase tracking-wider mb-2">Core guarantee of ε-DP</div>
            <div className="font-mono text-sm text-indigo-300">
              P[M(D) = O] ≤ e<sup>ε</sup> · P[M(D+x) = O] &nbsp; for all outputs O
            </div>
            <p className="text-xs text-gray-600 mt-2">
              At ε = {epsilon.toFixed(2)}, query outputs can differ by at most a factor of {Math.exp(epsilon).toFixed(2)}.
              {Math.exp(epsilon) < 1.5 ? ' D and D+x are nearly indistinguishable.' :
               Math.exp(epsilon) < 5   ? ' Some signal still leaks through.' :
                                         ' Large factor — x is not well protected.'}
            </p>
          </div>

          <button onClick={onRestart}
            className="text-xs text-gray-700 hover:text-gray-500 transition-colors">
            ← Start over
          </button>
        </div>
      );
    }

    // ─── App ─────────────────────────────────────────────────────────────────
    function App() {
      const [phase, setPhase] = useState('landing');
      if (phase==='landing') return <Landing     onStart={()    => setPhase('compare')} />;
      if (phase==='compare') return <PhaseCompare onContinue={() => setPhase('mcqa')} />;
      if (phase==='mcqa')    return <PhaseMCQA    onContinue={() => setPhase('dp')} />;
      if (phase==='dp')      return <PhaseDP      onRestart={() => setPhase('landing')} />;
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
