<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Experience Differential Privacy</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode: 'class', theme: { extend: {} } }</script>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="dark bg-gray-950 text-gray-100 min-h-screen antialiased">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useMemo } = React;

    // ─── Dataset ──────────────────────────────────────────────────────────────
    const DATABASE_D = [
      { id:1,  name:'Alice M.',   dept:'Engineering', salary:95000,  sick:4 },
      { id:2,  name:'Bob K.',     dept:'Engineering', salary:88000,  sick:6 },
      { id:3,  name:'Eve P.',     dept:'Engineering', salary:105000, sick:3 },
      { id:4,  name:'Henry J.',   dept:'Engineering', salary:91000,  sick:5 },
      { id:5,  name:'Isabel R.',  dept:'Engineering', salary:98000,  sick:4 },
      { id:6,  name:'James T.',   dept:'Engineering', salary:82000,  sick:7 },
      { id:7,  name:'Carol T.',   dept:'Sales',       salary:72000,  sick:8 },
      { id:8,  name:'Frank N.',   dept:'Sales',       salary:78000,  sick:7 },
      { id:9,  name:'Karen L.',   dept:'Sales',       salary:68000,  sick:9 },
      { id:10, name:'Leo B.',     dept:'Sales',       salary:75000,  sick:6 },
      { id:11, name:'Mia S.',     dept:'Sales',       salary:71000,  sick:8 },
      { id:12, name:'David L.',   dept:'HR',          salary:65000,  sick:5 },
      { id:13, name:'Grace H.',   dept:'HR',          salary:62000,  sick:9 },
      { id:14, name:'Nina P.',    dept:'HR',          salary:67000,  sick:6 },
      { id:15, name:'Oscar M.',   dept:'HR',          salary:63000,  sick:7 },
    ];

    // x's individual record is hidden from the analyst — revealed only after the quiz
    const PERSON_X = { id:16, name:'Morgan X.', dept:'Engineering', salary:145000, sick:2 };
    const DATABASE_DX = [...DATABASE_D, PERSON_X];

    // ─── Statistics ───────────────────────────────────────────────────────────
    function computeStats(data) {
      const n = data.length;
      return {
        avgSalary: data.reduce((a, r) => a + r.salary, 0) / n,
        avgSick:   data.reduce((a, r) => a + r.sick,   0) / n,
        engCount:  data.filter(r => r.dept === 'Engineering').length,
        maxSalary: Math.max(...data.map(r => r.salary)),
      };
    }

    const STATS_D  = computeStats(DATABASE_D);   // avgSalary≈78667, avgSick≈6.27, eng=6, max=105000
    const STATS_DX = computeStats(DATABASE_DX);  // avgSalary≈82813, avgSick≈6.00, eng=7, max=145000

    const STAT_DEFS = [
      { key:'avgSalary', label:'Mean salary',           icon:'💼',
        fmt: v => `$${Math.round(v).toLocaleString()}`,
        sensitivity: 145000 / DATABASE_DX.length },
      { key:'avgSick',   label:'Mean sick days / yr',   icon:'🏥',
        fmt: v => v.toFixed(2),
        sensitivity: 30 / DATABASE_DX.length },
      { key:'engCount',  label:'Engineering headcount', icon:'👥',
        fmt: v => String(Math.round(v)),
        sensitivity: 1 },
      { key:'maxSalary', label:'Highest salary',        icon:'📈',
        fmt: v => `$${Math.round(v).toLocaleString()}`,
        sensitivity: 145000 },
    ];

    // ─── DP Math ──────────────────────────────────────────────────────────────
    function laplaceSample(b) {
      const u = Math.random() - 0.5;
      return -b * Math.sign(u) * Math.log(1 - 2 * Math.abs(u));
    }
    function sampleNoisyStats(trueStats, epsilon) {
      return Object.fromEntries(
        STAT_DEFS.map(def => [def.key, trueStats[def.key] + laplaceSample(def.sensitivity / epsilon)])
      );
    }

    // ─── ML Phase data & helpers ──────────────────────────────────────────────
    // Unit noise is fixed per employee (computed once at load) so extraction
    // values are deterministic per (employee, ε) — no resample needed.
    const UNIT_NOISE = Object.fromEntries(
      DATABASE_DX.map(r => [r.id, {
        salary: (Math.random() - 0.5) * 2,
        sick:   (Math.random() - 0.5) * 2,
      }])
    );

    // Each card: text the "model" might reproduce, baseScore = score at ε → ∞
    const MI_CARDS = [
      { id:'a1', text: 'Alice M. earns $95,000 per year',     baseScore: 0.91 },
      { id:'a2', text: 'Bob K. takes 12 sick days per year',  baseScore: 0.08 },
      { id:'a3', text: 'Eve P. works in Engineering',         baseScore: 0.89 },
      { id:'a4', text: 'Carol T. earns $95,000 per year',     baseScore: 0.07 },
      { id:'a5', text: 'Grace H. takes 9 sick days per year', baseScore: 0.87 },
      { id:'a6', text: 'Morgan X. earns $145,000 per year',   baseScore: 0.92, scary: true },
    ];

    // At low ε all scores collapse toward 0.5 (chance); at high ε they spread.
    function membershipScore(baseScore, epsilon) {
      const t = Math.min(1, epsilon / 5);
      return baseScore * t + 0.5 * (1 - t);
    }

    // Three quality tiers for text completion:
    //   exact     — model reproduces training data verbatim (high ε, no DP)
    //   noisy     — coherent sentence, wrong values (medium ε)
    //   protected — gibberish / nonsense output (low ε, strong DP)
    // Seeded PRNG (mulberry32) — deterministic per employee, looks random
    function mulberry32(seed) {
      let a = seed | 0;
      return () => {
        a = (a + 0x6D2B79F5) | 0;
        let t = Math.imul(a ^ (a >>> 15), 1 | a);
        t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
        return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
      };
    }

    // Token pool: plausible-sounding but semantically incoherent in combination
    const TOKEN_POOL = [
      'pursuant','amortized','bilateral','contingent','fiduciary',
      'nominal','aggregate','provisional','variable','intermittent',
      'redundant','latent','procedural','quarterly','membrane',
      'tribunal','syndicate','liaison','disbursement','stipend',
      'allocation','entitlement','framework','oversight','standby',
      'mandate','protocol','directive','bylaw','threshold',
      'accrual','deferral','indemnity','covenant','whereas',
      'hereinafter','notwithstanding','aforementioned','thereof','annex',
      'severance','benchmark','clause','subsection','amendment',
      'remediation','recalibration','subroutine','encumbrance','rollover',
    ];

    function gibWords(rng, count) {
      return Array.from({ length: count },
        () => TOKEN_POOL[Math.floor(rng() * TOKEN_POOL.length)]
      ).join(' ');
    }

    // Adjacent dept names (recognizable but wrong) and qualifier suffixes
    const ADJ_DEPTS = ['Product', 'Finance', 'Legal', 'Operations', 'Marketing', 'IT', 'Strategy'];
    const ADJ_QUAL  = ['Division', 'Services', 'Group', 'Unit', 'Team', 'Ops', 'Bureau'];
    const ADJ_SALS  = [12000, 185000, 22000, 295000, 8500, 42000, 210000, 55000, 3200, 400000];
    const ADJ_SICK  = [0, 30, 25, 52, 45, 18, 38, 60];

    function getCompletion(emp, epsilon, sliderVal) {
      const n = UNIT_NOISE[emp.id];

      if (epsilon >= 4) {
        return { salary: `$${emp.salary.toLocaleString()}`, dept: emp.dept,
                 sick: `${emp.sick}`, quality: 'exact' };
      }

      if (epsilon >= 1.2) {
        const nSal  = Math.max(20000, Math.round(emp.salary + n.salary * 32000 / epsilon));
        const nSick = Math.max(0, Math.round(emp.sick + n.sick * 7 / epsilon));
        const depts = ['Engineering', 'Sales', 'HR'];
        const wrongIdx = (depts.indexOf(emp.dept) + (n.salary > 0 ? 1 : 2)) % 3;
        return { salary: `$${nSal.toLocaleString()}`,
                 dept: epsilon >= 2.5 ? emp.dept : depts[wrongIdx],
                 sick: `${nSick}`, quality: 'noisy' };
      }

      // Protected zone — seed steps every 0.1 ε (not every slider tick)
      const step = Math.round(epsilon * 10);
      const base = emp.id * 997 + step * 137;
      const rD   = mulberry32(base + 1);
      const rS   = mulberry32(base + 2);
      const rK   = mulberry32(base + 3);
      const pick = (rng, arr) => arr[Math.floor(rng() * arr.length)];

      if (epsilon >= 0.9) {
        // Stage 1: correct format + adjacent suffix — almost recognisable
        const nSal  = Math.max(10000, Math.round(emp.salary + (rS() - 0.5) * 60000));
        const nSick = Math.max(0, Math.round(emp.sick + (rK() - 0.5) * 8));
        return { dept:   `${emp.dept} ${pick(rD, ADJ_QUAL)}`,
                 salary: `$${nSal.toLocaleString()}`,
                 sick:   `${nSick}`, quality: 'protected' };

      } else if (epsilon >= 0.6) {
        // Stage 2: fully adjacent — recognizable category, plausible but wrong values
        return { dept:   pick(rD,  ADJ_DEPTS),
                 salary: `$${pick(rS, ADJ_SALS).toLocaleString()}`,
                 sick:   `${pick(rK, ADJ_SICK)}`, quality: 'protected' };

      } else if (epsilon >= 0.3) {
        // Stage 3: adjacent word + random token mixed
        const tok1 = TOKEN_POOL[Math.floor(rD()  * TOKEN_POOL.length)];
        const tok2 = TOKEN_POOL[Math.floor(rS()  * TOKEN_POOL.length)];
        const tok3 = TOKEN_POOL[Math.floor(rK()  * TOKEN_POOL.length)];
        return { dept:   `${pick(rD, ADJ_DEPTS)} ${tok1}`,
                 salary: `${tok2} $${Math.round(rS() * 300000 + 5000).toLocaleString()}`,
                 sick:   tok3, quality: 'protected' };

      } else {
        // Stage 4: fully random tokens
        return { dept:   gibWords(mulberry32(base + 10), 3),
                 salary: gibWords(mulberry32(base + 11), 4),
                 sick:   gibWords(mulberry32(base + 12), 2),
                 quality: 'protected' };
      }
    }

    function CompletionChip({ text, quality }) {
      return (
        <span className={`inline-block px-1.5 py-0.5 rounded font-mono font-semibold mx-0.5 ${
          quality === 'exact'     ? 'text-red-300   bg-red-950/70   border border-red-900/60' :
          quality === 'noisy'     ? 'text-amber-300 bg-amber-950/70 border border-amber-900/60' :
                                    'text-green-300 bg-green-950/70 border border-green-900/60'}`}>
          {text}
        </span>
      );
    }

    // ─── Quiz ─────────────────────────────────────────────────────────────────
    const QUESTIONS = [
      {
        key: 'salary',
        q: 'Mean salary rose from $78,667 → $82,813 when x joined.',
        prompt: "What is x's exact salary?",
        options: ['Around $79k — close to the group average', 'Between $90k and $120k', 'Well above $130k'],
        correct: 2,
        math: `x's salary = 16 × $82,813 − 15 × $78,667 = $1,325,008 − $1,180,005 = $145,003`,
      },
    ];

    // ─── Step bar ─────────────────────────────────────────────────────────────
    function StepBar({ current, onStep }) {
      const steps = ['D vs D+x', 'Infer x', 'DP', 'ML model', 'Research'];
      return (
        <div className="flex items-center gap-1 mb-8">
          {steps.map((s, i) => (
            <React.Fragment key={s}>
              <button onClick={() => onStep(i)}
                className={`flex items-center gap-1.5 text-xs transition-colors cursor-pointer ${
                  i === current ? 'text-indigo-300' :
                  i < current  ? 'text-gray-500 hover:text-gray-300' :
                                 'text-gray-700 hover:text-gray-500'}`}>
                <span className={`w-5 h-5 rounded-full flex items-center justify-center text-[10px] font-bold ${
                  i === current ? 'bg-indigo-600 text-white' :
                  i < current  ? 'bg-gray-800 text-gray-500' :
                                 'border border-gray-800 text-gray-700'}`}>{i+1}</span>
                <span className="hidden sm:inline">{s}</span>
              </button>
              {i < steps.length-1 && <div className={`flex-1 h-px mx-1 ${i < current ? 'bg-gray-700' : 'bg-gray-800'}`} />}
            </React.Fragment>
          ))}
        </div>
      );
    }

    // ─── Landing ──────────────────────────────────────────────────────────────
    function Landing({ onStart }) {
      return (
        <div className="min-h-screen flex flex-col items-center justify-center text-center px-8 gap-6">
          <h1 className="text-4xl sm:text-5xl font-bold max-w-2xl leading-tight">
            What can aggregate statistics<br className="hidden sm:block" />reveal about you?
          </h1>
          <p className="text-gray-400 max-w-sm text-sm">
            Knowing the mean salary before and after you join a database
            is enough to infer your exact salary.
          </p>
          <button onClick={onStart}
            className="px-8 py-3 rounded-lg bg-indigo-600 hover:bg-indigo-500 font-medium transition-colors">
            Show me
          </button>
        </div>
      );
    }

    // ─── Phase 1: D vs D+x ───────────────────────────────────────────────────
    const DEPT_COLORS = {
      Engineering: 'text-indigo-400',
      Sales:       'text-emerald-400',
      HR:          'text-amber-400',
    };

    function PhaseCompare({ onContinue, goToStep }) {
      const [xAdded, setXAdded] = useState(false);

      return (
        <div className="max-w-5xl mx-auto px-4 sm:px-6 py-8">
          <StepBar current={0} onStep={goToStep} />

          {/* Header */}
          <div className="flex items-center justify-between mb-4">
            <div>
              <h2 className="text-xl font-bold">
                Database <span className="font-mono text-indigo-300">{xAdded ? 'D+x' : 'D'}</span>
                <span className="text-gray-600 text-sm font-normal ml-2">— {xAdded ? 16 : 15} records</span>
              </h2>
              <p className="text-xs text-gray-500 mt-0.5">
                The analyst sees only the aggregate queries on the right — never individual rows.
              </p>
            </div>
            {!xAdded && (
              <button onClick={() => setXAdded(true)}
                className="shrink-0 px-4 py-2 rounded-lg border border-dashed border-indigo-600/60 hover:border-indigo-400 hover:bg-indigo-950/30 text-indigo-400 hover:text-indigo-300 text-sm font-medium transition-all">
                + x joins →
              </button>
            )}
          </div>

          <div className="grid grid-cols-1 lg:grid-cols-5 gap-4">
            {/* Table — 3 cols */}
            <div className="lg:col-span-3 border border-gray-800 rounded-xl overflow-hidden">
              <div className="overflow-y-auto" style={{ maxHeight: '420px' }}>
                <table className="w-full text-xs">
                  <thead className="sticky top-0 bg-gray-900 text-gray-500">
                    <tr>
                      <th className="px-3 py-2.5 text-left font-medium">Name</th>
                      <th className="px-3 py-2.5 text-left font-medium">Dept</th>
                      <th className="px-3 py-2.5 text-right font-medium">Salary</th>
                      <th className="px-3 py-2.5 text-right font-medium">Sick days</th>
                    </tr>
                  </thead>
                  <tbody className="bg-gray-900/30">
                    {DATABASE_D.map(r => (
                      <tr key={r.id} className="border-t border-gray-800/60 text-gray-300 hover:bg-gray-800/30">
                        <td className="px-3 py-1.5 font-mono">{r.name}</td>
                        <td className={`px-3 py-1.5 ${DEPT_COLORS[r.dept]}`}>{r.dept}</td>
                        <td className="px-3 py-1.5 text-right">${r.salary.toLocaleString()}</td>
                        <td className="px-3 py-1.5 text-right">{r.sick}</td>
                      </tr>
                    ))}
                    {xAdded && (
                      <tr className="border-t-2 border-indigo-500 bg-indigo-950/50">
                        <td className="px-3 py-2 font-mono text-indigo-300 font-semibold">x</td>
                        <td className="px-3 py-2 text-indigo-800 italic text-[10px]">private</td>
                        <td className="px-3 py-2 text-right text-indigo-800 italic text-[10px]">private</td>
                        <td className="px-3 py-2 text-right text-indigo-800 italic text-[10px]">private</td>
                      </tr>
                    )}
                  </tbody>
                </table>
              </div>
            </div>

            {/* Stats — 2 cols */}
            <div className="lg:col-span-2 space-y-2">
              {STAT_DEFS.map(def => {
                const dVal    = STATS_D[def.key];
                const dxVal   = STATS_DX[def.key];
                const delta   = dxVal - dVal;
                const changed = xAdded && delta !== 0;
                const up      = delta > 0;
                return (
                  <div key={def.key} className={`border rounded-xl px-4 py-3 transition-all duration-500 ${
                    changed ? 'border-amber-700/50 bg-amber-950/20' : 'border-gray-800 bg-gray-900/40'}`}>
                    <div className="text-[10px] text-gray-600 uppercase tracking-wider mb-1">
                      {def.icon} {def.label}
                    </div>
                    <div className="flex items-end justify-between">
                      <span className="font-mono text-lg font-bold">
                        {def.fmt(xAdded ? dxVal : dVal)}
                      </span>
                      {changed && (
                        <span className={`text-xs font-mono font-bold ${up ? 'text-red-400' : 'text-emerald-400'}`}>
                          {up ? '▲' : '▼'} {def.fmt(Math.abs(delta))}
                        </span>
                      )}
                    </div>
                  </div>
                );
              })}

              {xAdded && (
                <button onClick={onContinue}
                  className="w-full py-2.5 rounded-xl bg-indigo-600 hover:bg-indigo-500 text-sm font-medium transition-colors mt-2">
                  What does this reveal about x? →
                </button>
              )}
            </div>
          </div>
        </div>
      );
    }

    // ─── Phase 2: Quiz ────────────────────────────────────────────────────────
    function PhaseMCQA({ onContinue, goToStep }) {
      const [guesses,  setGuesses]  = useState({});
      const [revealed, setRevealed] = useState(false);
      const allAnswered = QUESTIONS.every(q => guesses[q.key] !== undefined);
      const score = QUESTIONS.filter(q => guesses[q.key] === q.correct).length;

      return (
        <div className="max-w-2xl mx-auto px-4 sm:px-6 py-8">
          <StepBar current={1} onStep={goToStep} />
          <h2 className="text-xl font-bold mb-1">Infer x's profile</h2>
          <p className="text-xs text-gray-500 mb-6">
            The analyst sees only how the statistics shifted. What can they deduce?
          </p>

          <div className="space-y-4">
            {QUESTIONS.map((q, qi) => {
              const g = guesses[q.key];
              return (
                <div key={q.key} className="border border-gray-800 rounded-xl overflow-hidden">
                  {/* Observed change — the "clue" */}
                  <div className="bg-gray-900 px-4 py-2.5 border-b border-gray-800">
                    <span className="text-[10px] text-gray-600 uppercase tracking-wider mr-2">Observed</span>
                    <span className="text-xs font-mono text-amber-300">{q.q}</span>
                  </div>
                  {/* Question */}
                  <div className="px-4 pt-3 pb-1">
                    <p className="text-sm font-medium text-gray-200 mb-2">{q.prompt}</p>
                    <div className="space-y-1.5">
                      {q.options.map((opt, oi) => {
                        const chosen  = g === oi;
                        const correct = revealed && oi === q.correct;
                        const wrong   = revealed && chosen && oi !== q.correct;
                        return (
                          <button key={oi} onClick={() => !revealed && setGuesses(gs => ({ ...gs, [q.key]: oi }))}
                            className={`w-full text-left px-3 py-2 rounded-lg border text-sm transition-colors ${
                              correct ? 'border-green-700 bg-green-950/40 text-green-300' :
                              wrong   ? 'border-red-800  bg-red-950/30  text-red-300' :
                              chosen  ? 'border-indigo-600 bg-indigo-950/40 text-indigo-200' :
                                        'border-gray-800 text-gray-400 hover:border-gray-600'
                            } ${revealed ? 'cursor-default' : 'cursor-pointer'}`}>
                            <span className="text-[10px] text-gray-600 font-mono mr-2">{String.fromCharCode(97+oi)})</span>
                            {opt}
                            {correct && ' ✓'}{wrong && ' ✗'}
                          </button>
                        );
                      })}
                    </div>
                  </div>
                  {/* Math explanation */}
                  {revealed && (
                    <div className="px-4 pb-3 pt-2">
                      <p className="text-[11px] text-gray-500 font-mono bg-gray-900/60 rounded px-2.5 py-1.5">
                        {q.math}
                      </p>
                    </div>
                  )}
                </div>
              );
            })}
          </div>

          <div className="mt-4 space-y-3">
            {allAnswered && !revealed && (
              <button onClick={() => setRevealed(true)}
                className="w-full py-2.5 rounded-xl bg-indigo-600 hover:bg-indigo-500 text-sm font-medium transition-colors">
                Check answers
              </button>
            )}
            {revealed && (
              <>
                <div className="border border-gray-800 rounded-xl p-4 flex items-center justify-between">
                  <div>
                    <span className="text-2xl font-bold">{score===1 ? '✓' : '✗'}</span>
                    <span className="text-xs text-gray-500 ml-2">
                      {score===1 ? 'Exact salary recovered from one query.' : 'Try the math — one query is enough.'}
                    </span>
                  </div>
                  <div className="text-right text-xs font-mono space-y-0.5">
                    <div className="text-indigo-300 font-semibold">{PERSON_X.name}</div>
                    <div className="text-gray-400">salary: ${PERSON_X.salary.toLocaleString()}</div>
                  </div>
                </div>
                <button onClick={onContinue}
                  className="w-full py-2.5 rounded-xl bg-indigo-600 hover:bg-indigo-500 text-sm font-medium transition-colors">
                  How does DP protect x? →
                </button>
              </>
            )}
          </div>
        </div>
      );
    }

    // ─── Phase 3: DP ─────────────────────────────────────────────────────────
    function PhaseDP({ onContinue, onRestart, goToStep }) {
      const sliderToEps = v => Math.pow(10, -1 + (v / 100) * 2);
      const [sliderVal, setSliderVal] = useState(85);
      const [seed, setSeed] = useState(0);
      const epsilon = sliderToEps(sliderVal);

      const noisyD  = useMemo(() => sampleNoisyStats(STATS_D,  epsilon), [epsilon, seed]);
      const noisyDX = useMemo(() => sampleNoisyStats(STATS_DX, epsilon), [epsilon, seed]);

      const def        = STAT_DEFS[0];
      const scale      = def.sensitivity / epsilon;
      const vD         = noisyD.avgSalary;
      const vDX        = noisyDX.avgSalary;
      const obsDelta   = vDX - vD;
      const trueDelta  = STATS_DX.avgSalary - STATS_D.avgSalary;   // ≈ $4,146
      const hidden     = Math.abs(obsDelta) <= 1.5 * scale;
      // How much of the true signal is recoverable (clamped 0–1, inverted for "utility")
      const signalRatio = Math.min(1, Math.abs(obsDelta) / (1.5 * scale));

      const protection =
        epsilon < 0.5 ? "Strong — x's salary is hidden in noise" :
        epsilon < 2   ? "Moderate — signal may still be detectable" :
        epsilon < 5   ? "Weak — salary change visible to analyst" :
                        "Minimal — salary change fully exposed";

      return (
        <div className="max-w-2xl mx-auto px-4 sm:px-6 py-8">
          <StepBar current={2} onStep={goToStep} />
          <h2 className="text-xl font-bold mb-1">Differential privacy</h2>
          <p className="text-xs text-gray-500 mb-6">
            Add Laplace noise to every query answer. At small ε the reported salary averages for D and D+x
            become indistinguishable — x's exact salary can no longer be recovered.
          </p>

          {/* Slider */}
          <div className="border border-gray-800 rounded-xl p-4 mb-5 space-y-2">
            <div className="flex justify-between text-[10px] text-gray-600 uppercase tracking-wider">
              <span>← high privacy (ε = 0.1)</span>
              <span>no privacy (ε = 10) →</span>
            </div>
            <input type="range" min="0" max="100" step="1" value={sliderVal}
              onChange={e => setSliderVal(Number(e.target.value))}
              className="w-full accent-indigo-500 cursor-pointer" />
            <div className="flex items-center gap-3">
              <span className="text-2xl font-mono font-bold text-indigo-300">ε = {epsilon.toFixed(2)}</span>
              <span className="text-xs text-gray-500 flex-1 italic">{protection}</span>
              <button onClick={() => setSeed(s => s+1)}
                className="text-[11px] text-gray-600 hover:text-gray-400 border border-gray-800 rounded px-2 py-1 transition-colors">
                ↺ resample
              </button>
            </div>
          </div>

          {/* Two salary cards */}
          <div className="grid grid-cols-2 gap-3 mb-3">
            {[
              { label: 'D — 15 employees', noisy: vD, true_: STATS_D.avgSalary },
              { label: 'D+x — 16 employees', noisy: vDX, true_: STATS_DX.avgSalary },
            ].map(({ label, noisy, true_ }) => (
              <div key={label} className="border border-gray-800 rounded-xl p-4">
                <div className="text-[10px] text-gray-600 uppercase tracking-wider mb-2">{label}</div>
                <div className="font-mono text-2xl font-bold text-gray-100">{def.fmt(noisy)}</div>
                <div className="text-[10px] text-gray-700 mt-1 font-mono">true: {def.fmt(true_)}</div>
              </div>
            ))}
          </div>

          {/* Signal vs noise panel */}
          <div className={`border rounded-xl p-5 mb-5 transition-colors duration-500 ${
            hidden ? 'border-green-900/60 bg-green-950/15' : 'border-red-900/60 bg-red-950/15'}`}>

            <div className="flex items-start justify-between mb-4">
              <div>
                <div className="text-[10px] text-gray-600 uppercase tracking-wider mb-1">Reported salary change</div>
                <div className={`font-mono text-3xl font-bold ${obsDelta >= 0 ? 'text-red-400' : 'text-emerald-400'}`}>
                  {obsDelta >= 0 ? '+' : '−'}{def.fmt(Math.abs(obsDelta))}
                </div>
                <div className="text-[10px] text-gray-600 mt-1">true signal: <span className="text-amber-500 font-mono">+{def.fmt(trueDelta)}</span></div>
              </div>
              <div className="text-right">
                <div className="text-[10px] text-gray-600 uppercase tracking-wider mb-1">Noise scale</div>
                <div className="font-mono text-xl text-gray-400">±{def.fmt(scale)}</div>
                <div className="text-[10px] text-gray-700 mt-1">Laplace(0, Δf/ε)</div>
              </div>
            </div>

            {/* Signal-to-noise bar */}
            <div className="mb-3">
              <div className="flex justify-between text-[9px] text-gray-700 mb-1 uppercase tracking-wider">
                <span>Signal vs noise</span>
                <span>{hidden ? 'signal buried' : 'signal visible'}</span>
              </div>
              <div className="h-2.5 bg-gray-800 rounded-full overflow-hidden">
                <div className={`h-full rounded-full transition-all duration-500 ${hidden ? 'bg-green-700' : 'bg-red-600'}`}
                  style={{ width: `${Math.round(signalRatio * 100)}%` }} />
              </div>
            </div>

            <div className={`rounded-lg py-3 px-4 text-center font-semibold text-sm transition-colors duration-500 ${
              hidden ? 'bg-green-900/30 text-green-300' : 'bg-red-900/30 text-red-300'}`}>
              {hidden
                ? "✓  Noise swamps the signal — x's salary is unrecoverable"
                : "✗  Signal still detectable — analyst can back-calculate x's salary"}
            </div>
          </div>

          {/* Formal guarantee */}
          <div className="border border-indigo-900/40 bg-indigo-950/20 rounded-xl p-4 mb-6">
            <div className="text-[10px] text-indigo-600 uppercase tracking-wider mb-2">Formal ε-DP guarantee</div>
            <div className="font-mono text-sm text-indigo-300">
              P[M(D) = O] ≤ e<sup>ε</sup> · P[M(D+x) = O] &nbsp;&nbsp; ∀ outputs O
            </div>
            <p className="text-xs text-gray-600 mt-2">
              At ε = {epsilon.toFixed(2)}, D and D+x produce outputs within a factor of {Math.exp(epsilon).toFixed(2)} of each other.
              {Math.exp(epsilon) < 1.5 ? ' Practically indistinguishable.' :
               Math.exp(epsilon) < 5   ? ' Some distinguishability remains.' :
                                         ' Easily distinguished — x is exposed.'}
            </p>
          </div>

          <div className="flex items-center gap-4">
            <button onClick={onRestart}
              className="text-xs text-gray-700 hover:text-gray-500 transition-colors">
              ← Start over
            </button>
            <button onClick={onContinue}
              className="ml-auto px-5 py-2.5 rounded-xl bg-indigo-600 hover:bg-indigo-500 text-sm font-medium transition-colors">
              See it in a trained ML model →
            </button>
          </div>
        </div>
      );
    }

    // ─── Phase 4: ML model ───────────────────────────────────────────────────
    function PhaseML({ onContinue, onRestart, goToStep }) {
      const sliderToEps = v => Math.pow(10, -1 + (v / 100) * 2);
      const [sliderVal, setSliderVal] = useState(80);
      const epsilon = sliderToEps(sliderVal);

      const [selectedId, setSelectedId] = useState(DATABASE_DX[0].id);
      const emp = DATABASE_DX.find(r => r.id === selectedId);

      const completion = getCompletion(emp, epsilon, sliderVal);

      const protection =
        epsilon < 0.5 ? 'Strong DP — both attacks fail' :
        epsilon < 2   ? 'Moderate DP — extraction noisy, inference near chance' :
        epsilon < 5   ? 'Weak DP — some leakage visible' :
                        'No DP — model memorizes training data';

      return (
        <div className="max-w-5xl mx-auto px-4 sm:px-6 py-8">
          <StepBar current={3} onStep={goToStep} />
          <h2 className="text-xl font-bold mb-1">ML model trained on the same data</h2>
          <p className="text-xs text-gray-500 mb-5">
            Without DP, a model trained on D+x leaks information two ways: membership inference
            (did this exact fact appear in training?) and verbatim extraction (can we recover the value?).
            Drag ε to see DP-SGD shut both down.
          </p>

          {/* Shared epsilon slider */}
          <div className="border border-gray-800 rounded-xl p-4 mb-6 space-y-2">
            <div className="flex justify-between text-[10px] text-gray-600 uppercase tracking-wider">
              <span>← strong DP (ε = 0.1)</span>
              <span>no DP (ε = 10) →</span>
            </div>
            <input type="range" min="0" max="100" step="1" value={sliderVal}
              onChange={e => setSliderVal(Number(e.target.value))}
              className="w-full accent-indigo-500 cursor-pointer" />
            <div className="flex items-center gap-3">
              <span className="text-2xl font-mono font-bold text-indigo-300">ε = {epsilon.toFixed(2)}</span>
              <span className="text-xs text-gray-500 flex-1 italic">{protection}</span>
            </div>
          </div>

          <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">

            {/* Left panel: Membership inference */}
            <div className="border border-gray-800 rounded-xl overflow-hidden">
              <div className="bg-gray-900 px-4 py-2.5 border-b border-gray-800">
                <span className="text-xs font-semibold text-gray-200">Membership inference</span>
                <span className="text-[10px] text-gray-600 ml-2">— did this fact appear in training?</span>
              </div>
              <div className="p-3 space-y-2.5">
                {MI_CARDS.map(card => {
                  const score = membershipScore(card.baseScore, epsilon);
                  const pct   = Math.round(score * 100);
                  const high  = score > 0.65;
                  const low   = score < 0.35;
                  return (
                    <div key={card.id} className={`rounded-lg border p-3 ${
                      card.scary && high ? 'border-red-800/60 bg-red-950/20' : 'border-gray-800 bg-gray-900/30'}`}>
                      <div className="flex items-start justify-between gap-2 mb-1.5">
                        <span className={`text-xs font-mono ${card.scary && high ? 'text-red-300' : 'text-gray-300'}`}>
                          "{card.text}"
                        </span>
                        {card.scary && (
                          <span className="shrink-0 text-[9px] bg-amber-900/50 text-amber-400 border border-amber-800/50 rounded px-1.5 py-0.5">
                            x's record
                          </span>
                        )}
                      </div>
                      <div className="flex items-center gap-2">
                        <div className="flex-1 h-1.5 bg-gray-800 rounded-full overflow-hidden">
                          <div className={`h-full rounded-full transition-all duration-500 ${
                            high ? 'bg-red-500' : low ? 'bg-green-600' : 'bg-amber-500'}`}
                            style={{ width: `${pct}%` }} />
                        </div>
                        <span className={`text-[11px] font-mono font-bold w-8 text-right ${
                          high ? 'text-red-400' : low ? 'text-green-400' : 'text-amber-400'}`}>
                          {(score).toFixed(2)}
                        </span>
                      </div>
                      <div className="flex items-center justify-between mt-1">
                        <span className="text-[9px] text-gray-700">0 — non-member</span>
                        <div className="h-3 w-px bg-gray-700 mx-1 self-center" style={{marginLeft:`calc(50% - 4px)`}} />
                        <span className="text-[9px] text-gray-700">1 — member</span>
                      </div>
                    </div>
                  );
                })}
                <p className="text-[10px] text-gray-600 italic pt-1">
                  Scores near 0.5 = indistinguishable from non-member. DP-SGD pushes all scores there.
                </p>
              </div>
            </div>

            {/* Right panel: Verbatim extraction */}
            <div className="border border-gray-800 rounded-xl overflow-hidden">
              <div className="bg-gray-900 px-4 py-2.5 border-b border-gray-800">
                <span className="text-xs font-semibold text-gray-200">Verbatim memorization</span>
                <span className="text-[10px] text-gray-600 ml-2">— can the model complete this text?</span>
              </div>
              <div className="p-4 space-y-4">
                {/* Employee picker */}
                <div>
                  <label className="text-[10px] text-gray-600 uppercase tracking-wider block mb-1">
                    Select employee
                  </label>
                  <select value={selectedId} onChange={e => setSelectedId(Number(e.target.value))}
                    className="w-full bg-gray-900 border border-gray-700 rounded-lg px-3 py-2 text-sm text-gray-200 focus:outline-none focus:border-indigo-600">
                    {DATABASE_DX.map(r => (
                      <option key={r.id} value={r.id}>
                        {r.name}{r.id === 16 ? ' ← x' : ''}
                      </option>
                    ))}
                  </select>
                </div>

                {/* Text completion display */}
                <div className="rounded-lg border border-gray-800 overflow-hidden font-mono text-sm">
                  {/* Prompt */}
                  <div className="bg-gray-900/80 px-4 py-3 border-b border-gray-800">
                    <div className="text-[9px] text-gray-600 uppercase tracking-wider mb-1.5">Prompt</div>
                    <span className="text-gray-500">
                      Complete the HR record for {emp.name}:
                    </span>
                  </div>
                  {/* Completion */}
                  <div className={`px-4 py-3 transition-colors duration-500 ${
                    completion.quality === 'exact'     ? 'bg-red-950/15' :
                    completion.quality === 'noisy'     ? 'bg-amber-950/15' :
                                                         'bg-green-950/15'}`}>
                    <div className="text-[9px] text-gray-600 uppercase tracking-wider mb-2">Model output</div>
                    <p className="text-gray-400 leading-relaxed">
                      <span>"They work in </span>
                      <CompletionChip text={completion.dept} quality={completion.quality} />
                      <span>, earning </span>
                      <CompletionChip text={completion.salary} quality={completion.quality} />
                      <span> per year. Last year they took </span>
                      <CompletionChip text={`${completion.sick} sick days`} quality={completion.quality} />
                      <span>."</span>
                    </p>
                  </div>
                </div>

                {/* Quality label */}
                <div className={`rounded-lg px-4 py-2.5 text-xs border text-center transition-colors duration-500 ${
                  completion.quality === 'exact'
                    ? 'border-red-800/50   bg-red-950/20   text-red-300'
                    : completion.quality === 'noisy'
                    ? 'border-amber-800/50 bg-amber-950/20 text-amber-300'
                    : 'border-green-800/50 bg-green-950/20 text-green-300'}`}>
                  {completion.quality === 'exact'
                    ? 'Verbatim extraction — training data reproduced exactly'
                    : completion.quality === 'noisy'
                    ? 'Coherent but wrong — plausible text, incorrect values'
                    : 'Protected — DP noise makes output incoherent gibberish'}
                </div>

                {emp.id === 16 && completion.quality !== 'protected' && (
                  <div className="border border-amber-800/50 bg-amber-950/20 rounded-lg p-3 text-xs text-amber-300">
                    <strong>Morgan X.</strong> — x's record. At high ε the model reproduces their exact salary. Slide left to protect it.
                  </div>
                )}
              </div>
            </div>
          </div>

          <div className="mt-6 flex items-center gap-4">
            <button onClick={onRestart}
              className="text-xs text-gray-700 hover:text-gray-500 transition-colors">
              ← Start over
            </button>
            <button onClick={onContinue}
              className="ml-auto px-5 py-2.5 rounded-xl bg-indigo-600 hover:bg-indigo-500 text-sm font-medium transition-colors">
              Why this matters for AI research →
            </button>
          </div>
        </div>
      );
    }

    // ─── Phase 5: Research ───────────────────────────────────────────────────
    function PhaseResearch({ onRestart, goToStep }) {
      return (
        <div className="max-w-2xl mx-auto px-4 sm:px-6 py-8">
          <StepBar current={4} onStep={goToStep} />
          <h2 className="text-xl font-bold mb-1">From HR databases to foundation models</h2>
          <p className="text-xs text-gray-500 mb-6">
            The same privacy risk — at the scale of the entire internet.
          </p>

          <div className="space-y-4">

            <div className="border border-gray-800 rounded-xl p-5">
              <div className="flex items-start gap-4">
                <span className="text-2xl shrink-0">🌐</span>
                <div>
                  <h3 className="font-semibold text-gray-100 mb-1.5">Foundation models train on everything</h3>
                  <p className="text-sm text-gray-400 leading-relaxed">
                    GPT-4, Llama, Gemini — trained on trillions of tokens from the open web, including medical
                    forums, legal documents, financial records, and private communications. The
                    "x joins the database" problem now involves billions of individuals, none of whom consented.
                  </p>
                </div>
              </div>
            </div>

            <div className="border border-gray-800 rounded-xl p-5">
              <div className="flex items-start gap-4">
                <span className="text-2xl shrink-0">🔓</span>
                <div>
                  <h3 className="font-semibold text-gray-100 mb-1.5">Memorization attacks are real and proven</h3>
                  <p className="text-sm text-gray-400 leading-relaxed">
                    Carlini et al. (2021) extracted verbatim text from GPT-2 — names, phone numbers, addresses —
                    using only public API access. The text completion exercise above is a simplified version
                    of this exact attack. Membership inference against fine-tuned models regularly exceeds 80% accuracy.
                  </p>
                </div>
              </div>
            </div>

            <div className="border border-gray-800 rounded-xl p-5">
              <div className="flex items-start gap-4">
                <span className="text-2xl shrink-0">⚖️</span>
                <div>
                  <h3 className="font-semibold text-gray-100 mb-1.5">DP-SGD works — but at a steep cost</h3>
                  <p className="text-sm text-gray-400 leading-relaxed">
                    Differentially private training (Abadi et al. 2016) clips and noises gradients during
                    backpropagation, providing formal guarantees. But at the scale of large foundation models
                    the utility loss is severe, and the correct privacy budget ε for real-world deployment
                    remains an open question.
                  </p>
                </div>
              </div>
            </div>

            <div className="border border-indigo-900/40 bg-indigo-950/20 rounded-xl p-5">
              <div className="flex items-start gap-4">
                <span className="text-2xl shrink-0">🔬</span>
                <div>
                  <h3 className="font-semibold text-indigo-200 mb-1.5">The open problem</h3>
                  <p className="text-sm text-gray-400 leading-relaxed">
                    Can we fine-tune or train large foundation models on sensitive data — medical records,
                    financial data, private text — while providing meaningful differential privacy guarantees
                    without destroying their usefulness? This requires new theory on the privacy-utility
                    frontier at scale, tighter composition bounds, and better auditing tools to verify
                    what ε values actually mean in practice.
                  </p>
                  <div className="mt-3 flex flex-wrap gap-2">
                    {['DP fine-tuning', 'Privacy auditing', 'Tight composition', 'DP synthetic data', 'Membership inference'].map(t => (
                      <span key={t} className="text-[11px] bg-indigo-950/60 border border-indigo-900/40 text-indigo-400 rounded-full px-2.5 py-1">
                        {t}
                      </span>
                    ))}
                  </div>
                </div>
              </div>
            </div>

          </div>

          <div className="mt-6">
            <button onClick={onRestart}
              className="text-xs text-gray-700 hover:text-gray-500 transition-colors">
              ← Start over
            </button>
          </div>
        </div>
      );
    }

    // ─── App ─────────────────────────────────────────────────────────────────
    function App() {
      const [phase, setPhase] = useState('landing');
      const PHASES = ['compare', 'mcqa', 'dp', 'ml', 'research'];
      const goToStep = i => setPhase(PHASES[i]);
      if (phase==='landing')  return <Landing         onStart={()    => setPhase('compare')} />;
      if (phase==='compare')  return <PhaseCompare    onContinue={() => setPhase('mcqa')}     goToStep={goToStep} />;
      if (phase==='mcqa')     return <PhaseMCQA       onContinue={() => setPhase('dp')}       goToStep={goToStep} />;
      if (phase==='dp')       return <PhaseDP         onContinue={() => setPhase('ml')} onRestart={() => setPhase('landing')} goToStep={goToStep} />;
      if (phase==='ml')       return <PhaseML         onContinue={() => setPhase('research')} onRestart={() => setPhase('landing')} goToStep={goToStep} />;
      if (phase==='research') return <PhaseResearch   onRestart={() => setPhase('landing')}   goToStep={goToStep} />;
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
