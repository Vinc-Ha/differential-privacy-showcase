<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Experience Differential Privacy</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode: 'class', theme: { extend: {} } }</script>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="dark bg-gray-950 text-gray-100 min-h-screen antialiased">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useMemo } = React;

    // ─── Dataset ──────────────────────────────────────────────────────────────
    const DATABASE_D = [
      { id:1, name:'Alice M.',  dept:'Engineering', salary:95000,  sick:4 },
      { id:2, name:'Bob K.',    dept:'Engineering', salary:88000,  sick:6 },
      { id:3, name:'Carol T.',  dept:'Sales',       salary:72000,  sick:8 },
      { id:4, name:'David L.',  dept:'HR',          salary:65000,  sick:5 },
      { id:5, name:'Eve P.',    dept:'Engineering', salary:105000, sick:3 },
      { id:6, name:'Frank N.',  dept:'Sales',       salary:78000,  sick:7 },
      { id:7, name:'Grace H.',  dept:'HR',          salary:62000,  sick:9 },
      { id:8, name:'Henry J.',  dept:'Engineering', salary:91000,  sick:5 },
    ];

    // Person x — all fields private, revealed only after the quiz
    const PERSON_X = { id:9, name:'Morgan X.', dept:'Engineering', salary:145000, sick:2 };
    const DATABASE_DX = [...DATABASE_D, PERSON_X];

    // ─── Statistics ───────────────────────────────────────────────────────────
    function computeStats(dataset) {
      const n = dataset.length;
      return {
        avgSalary: dataset.reduce((a, r) => a + r.salary, 0) / n,
        avgSick:   dataset.reduce((a, r) => a + r.sick, 0)   / n,
        engCount:  dataset.filter(r => r.dept === 'Engineering').length,
        maxSalary: Math.max(...dataset.map(r => r.salary)),
      };
    }

    const STATS_D  = computeStats(DATABASE_D);
    const STATS_DX = computeStats(DATABASE_DX);

    // Global sensitivity for the Laplace mechanism (for each stat)
    const STAT_DEFS = [
      {
        key: 'avgSalary',
        label: 'Mean salary',
        icon: '💼',
        fmt: v => `$${Math.round(v).toLocaleString()}`,
        // Adding one person with salary up to $145k shifts the mean by at most $145k/n
        sensitivity: 145000 / DATABASE_DX.length,
      },
      {
        key: 'avgSick',
        label: 'Mean sick days / yr',
        icon: '🏥',
        fmt: v => v.toFixed(2),
        // Max sick days per person assumed ≤ 30
        sensitivity: 30 / DATABASE_DX.length,
      },
      {
        key: 'engCount',
        label: 'Engineering headcount',
        icon: '👥',
        fmt: v => String(Math.round(v)),
        sensitivity: 1,
      },
      {
        key: 'maxSalary',
        label: 'Highest salary',
        icon: '📈',
        fmt: v => `$${Math.round(v).toLocaleString()}`,
        // Max query: adding one record can change it by up to the record's value
        sensitivity: 145000,
      },
    ];

    // ─── DP Math ──────────────────────────────────────────────────────────────
    function laplaceSample(b) {
      const u = Math.random() - 0.5;
      return -b * Math.sign(u) * Math.log(1 - 2 * Math.abs(u));
    }

    function sampleNoisyStats(trueStats, epsilon) {
      return Object.fromEntries(
        STAT_DEFS.map(def => [
          def.key,
          trueStats[def.key] + laplaceSample(def.sensitivity / epsilon),
        ])
      );
    }

    // ─── Quiz questions ───────────────────────────────────────────────────────
    const QUESTIONS = [
      {
        key: 'salary',
        label: 'Salary',
        q: 'The mean salary rose by ~$7,000 when x joined. What does this reveal about x\'s salary?',
        options: [
          'Around $82,000 — near the group average',
          'Between $90,000 and $105,000',
          'Well above $100,000 — over $130,000',
        ],
        correct: 2,
        math: 'x\'s salary = 9 × $89k − 8 × $82k = $801k − $656k = $145,000. The new mean arithmetically exposes the exact value.',
      },
      {
        key: 'dept',
        label: 'Department',
        q: 'Engineering headcount increased by 1. Sales and HR did not change. What can you conclude?',
        options: [
          'x works in Sales or HR',
          'x works in Engineering',
          'x\'s department is ambiguous from count data',
        ],
        correct: 1,
        math: 'A +1 in Engineering and 0 elsewhere is a perfect match — department-level counts reveal x\'s group exactly.',
      },
      {
        key: 'sick',
        label: 'Sick leave',
        q: 'Mean sick days fell from 5.9 to 5.4 when x joined. What can you infer?',
        options: [
          'x takes more sick leave than the group average',
          'x takes sick leave at roughly the average rate',
          'x takes significantly fewer sick days than colleagues',
        ],
        correct: 2,
        math: 'The mean fell, so x pulls it down. x\'s value = 9 × 5.44 − 8 × 5.875 = 49 − 47 = 2 days. Well below the group average of 5.9.',
      },
    ];

    // ─── Step indicator ───────────────────────────────────────────────────────
    const STEPS = ['D vs D+x', 'Inference', 'DP protection'];

    function StepBar({ current }) {
      return (
        <div className="flex items-center gap-2 mb-8">
          {STEPS.map((s, i) => (
            <React.Fragment key={s}>
              <div className={`flex items-center gap-2 text-xs ${
                i === current ? 'text-indigo-300' : i < current ? 'text-gray-500' : 'text-gray-700'
              }`}>
                <span className={`w-5 h-5 rounded-full flex items-center justify-center text-xs font-bold ${
                  i === current ? 'bg-indigo-600 text-white' :
                  i < current  ? 'bg-gray-700 text-gray-400' :
                                 'border border-gray-700 text-gray-700'
                }`}>{i + 1}</span>
                <span className="hidden sm:inline">{s}</span>
              </div>
              {i < STEPS.length - 1 && (
                <div className={`flex-1 h-px ${i < current ? 'bg-gray-600' : 'bg-gray-800'}`} />
              )}
            </React.Fragment>
          ))}
        </div>
      );
    }

    // ─── Landing ──────────────────────────────────────────────────────────────
    function Landing({ onStart }) {
      return (
        <div className="min-h-screen flex flex-col items-center justify-center text-center px-8 gap-6">
          <h1 className="text-4xl sm:text-5xl font-bold text-gray-100 max-w-2xl leading-tight">
            What can aggregate statistics<br className="hidden sm:block" /> reveal about you?
          </h1>
          <p className="text-gray-400 max-w-md text-sm leading-relaxed">
            Knowing the mean salary before and after you join a database is enough
            to infer your exact salary. Differential privacy is designed to close this gap.
          </p>
          <button
            onClick={onStart}
            className="px-8 py-3 rounded-lg bg-indigo-600 hover:bg-indigo-500 text-base font-medium transition-colors"
          >
            Show me
          </button>
        </div>
      );
    }

    // ─── Phase 1: D vs D+x ───────────────────────────────────────────────────
    function PhaseCompare({ onContinue }) {
      const [xAdded, setXAdded] = useState(false);

      const deltaDir = (key) => {
        const d = STATS_DX[key] - STATS_D[key];
        return d > 0 ? '+' : d < 0 ? '−' : '';
      };
      const absDelta = (def) => def.fmt(Math.abs(STATS_DX[def.key] - STATS_D[def.key]));

      return (
        <div className="max-w-5xl mx-auto px-6 py-10">
          <StepBar current={0} />

          <div className="space-y-2 mb-8">
            <h2 className="text-2xl font-bold text-gray-100">The neighboring database</h2>
            <p className="text-sm text-gray-400 max-w-2xl">
              An analyst has read-only access to aggregate query results — not individual records.
              Below is the HR database <span className="font-mono text-indigo-300">D</span>.
              When one new employee <span className="font-mono text-indigo-300">x</span> joins,
              the database becomes <span className="font-mono text-indigo-300">D+x</span>.
              Watch what happens to the statistics.
            </p>
          </div>

          <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-6">

            {/* Table */}
            <div className="space-y-2">
              <div className="text-xs text-gray-500 uppercase tracking-wider">
                Database <span className="font-mono text-gray-300">{xAdded ? 'D+x' : 'D'}</span>
                <span className="ml-2 text-gray-600">— {xAdded ? 9 : 8} records</span>
              </div>
              <div className="border border-gray-700 rounded-lg overflow-x-auto">
                <table className="w-full text-xs">
                  <thead className="bg-gray-800/80 text-gray-400">
                    <tr>
                      <th className="px-3 py-2.5 text-left font-medium">Name</th>
                      <th className="px-3 py-2.5 text-left font-medium">Dept</th>
                      <th className="px-3 py-2.5 text-right font-medium">Salary</th>
                      <th className="px-3 py-2.5 text-right font-medium">Sick days/yr</th>
                    </tr>
                  </thead>
                  <tbody>
                    {DATABASE_D.map(r => (
                      <tr key={r.id} className="border-t border-gray-800 text-gray-300">
                        <td className="px-3 py-2 font-mono">{r.name}</td>
                        <td className="px-3 py-2 text-gray-400">{r.dept}</td>
                        <td className="px-3 py-2 text-right">${r.salary.toLocaleString()}</td>
                        <td className="px-3 py-2 text-right">{r.sick}</td>
                      </tr>
                    ))}
                    {xAdded && (
                      <tr className="border-t-2 border-indigo-500 bg-indigo-950/40">
                        <td className="px-3 py-2 font-mono text-indigo-300">x</td>
                        <td className="px-3 py-2 text-indigo-400/60 italic">private</td>
                        <td className="px-3 py-2 text-right text-indigo-400/60 italic">private</td>
                        <td className="px-3 py-2 text-right text-indigo-400/60 italic">private</td>
                      </tr>
                    )}
                  </tbody>
                </table>
              </div>
              {xAdded && (
                <p className="text-xs text-gray-500 italic">
                  x's individual record is marked private — the analyst cannot read it.
                </p>
              )}
            </div>

            {/* Stats */}
            <div className="space-y-2">
              <div className="text-xs text-gray-500 uppercase tracking-wider">
                Aggregate query results
              </div>
              <div className="space-y-2">
                {STAT_DEFS.map(def => {
                  const dVal  = STATS_D[def.key];
                  const dxVal = STATS_DX[def.key];
                  const changed = xAdded && dxVal !== dVal;
                  const up = dxVal > dVal;
                  return (
                    <div key={def.key} className={`border rounded-lg px-4 py-3 transition-all duration-300 ${
                      changed ? 'border-amber-700/70 bg-amber-950/20' : 'border-gray-700 bg-gray-800/40'
                    }`}>
                      <div className="flex items-center justify-between gap-3">
                        <span className="text-sm text-gray-300">
                          {def.icon}&nbsp; {def.label}
                        </span>
                        <div className="text-right">
                          <span className="font-mono text-base font-bold text-gray-100">
                            {def.fmt(xAdded ? dxVal : dVal)}
                          </span>
                          {changed && (
                            <span className={`ml-2 text-xs font-mono font-bold ${up ? 'text-red-400' : 'text-emerald-400'}`}>
                              {up ? '▲' : '▼'} {absDelta(def)}
                            </span>
                          )}
                        </div>
                      </div>
                      {!xAdded && (
                        <div className="text-xs text-gray-600 font-mono mt-0.5">
                          from D ({DATABASE_D.length} records)
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
            </div>
          </div>

          {/* Action */}
          {!xAdded ? (
            <button
              onClick={() => setXAdded(true)}
              className="w-full py-3 rounded-lg border-2 border-dashed border-indigo-700/60 hover:border-indigo-500 hover:bg-indigo-950/30 text-indigo-400 hover:text-indigo-300 font-medium text-sm transition-all"
            >
              + x joins the company → update to D+x
            </button>
          ) : (
            <div className="space-y-3">
              <div className="bg-amber-950/40 border border-amber-800/60 rounded-lg p-4 text-sm text-amber-200/90 leading-relaxed">
                <strong className="text-amber-300">Notice:</strong> by running the same 4 queries before and after x joined,
                the analyst can see every highlighted change — without ever reading x's private record.
                Can these changes reveal who x is?
              </div>
              <button
                onClick={onContinue}
                className="w-full py-3 rounded-lg bg-indigo-600 hover:bg-indigo-500 text-white font-medium transition-colors"
              >
                Find out what can be inferred →
              </button>
            </div>
          )}
        </div>
      );
    }

    // ─── Phase 2: MCQA ───────────────────────────────────────────────────────
    function PhaseMCQA({ onContinue }) {
      const [guesses,  setGuesses]  = useState({});
      const [revealed, setRevealed] = useState(false);

      const allAnswered = QUESTIONS.every(q => guesses[q.key] !== undefined);
      const score = QUESTIONS.filter(q => guesses[q.key] === q.correct).length;

      function guess(key, idx) {
        if (revealed) return;
        setGuesses(g => ({ ...g, [key]: idx }));
      }

      // Delta summary shown at the top as reference
      const deltas = [
        { label: 'Mean salary', value: `$${Math.round(STATS_DX.avgSalary).toLocaleString()} (was $${Math.round(STATS_D.avgSalary).toLocaleString()}, +$${Math.round(STATS_DX.avgSalary - STATS_D.avgSalary).toLocaleString()})` },
        { label: 'Eng. headcount', value: `${STATS_DX.engCount} (was ${STATS_D.engCount}, +1 · Sales: 0 · HR: 0)` },
        { label: 'Mean sick days', value: `${STATS_DX.avgSick.toFixed(2)} (was ${STATS_D.avgSick.toFixed(2)}, −${(STATS_D.avgSick - STATS_DX.avgSick).toFixed(2)})` },
      ];

      return (
        <div className="max-w-2xl mx-auto px-6 py-10">
          <StepBar current={1} />

          <div className="space-y-2 mb-6">
            <h2 className="text-2xl font-bold text-gray-100">What do the changes reveal?</h2>
            <p className="text-sm text-gray-400">
              Based solely on how the statistics shifted, infer x's private attributes.
            </p>
          </div>

          {/* Reference summary */}
          <div className="bg-gray-900 border border-gray-700 rounded-lg p-4 mb-6 space-y-1.5">
            <div className="text-xs text-gray-500 uppercase tracking-wider mb-2">Observed changes (D → D+x)</div>
            {deltas.map(d => (
              <div key={d.label} className="flex items-baseline gap-2 text-xs">
                <span className="text-gray-500 shrink-0">{d.label}:</span>
                <span className="font-mono text-amber-300">{d.value}</span>
              </div>
            ))}
          </div>

          {/* Questions */}
          <div className="space-y-5">
            {QUESTIONS.map((q, qi) => {
              const g = guesses[q.key];
              return (
                <div key={q.key} className="border border-gray-700 rounded-lg p-5 space-y-3">
                  <div className="flex items-start gap-3">
                    <span className="text-xs text-gray-600 font-mono mt-0.5 shrink-0">Q{qi + 1}</span>
                    <p className="text-sm text-gray-200 leading-snug">{q.q}</p>
                  </div>
                  <div className="space-y-2">
                    {q.options.map((opt, oi) => {
                      const chosen  = g === oi;
                      const correct = revealed && oi === q.correct;
                      const wrong   = revealed && chosen && oi !== q.correct;
                      return (
                        <button
                          key={oi}
                          onClick={() => guess(q.key, oi)}
                          className={`w-full text-left px-4 py-2.5 rounded-lg border text-sm transition-colors ${
                            correct ? 'border-green-600 bg-green-950/40 text-green-300' :
                            wrong   ? 'border-red-700  bg-red-950/30  text-red-300'   :
                            chosen  ? 'border-indigo-600 bg-indigo-950/40 text-indigo-200' :
                                      'border-gray-700 text-gray-400 hover:border-gray-500 hover:text-gray-300'
                          } ${revealed ? 'cursor-default' : 'cursor-pointer'}`}
                        >
                          <span className="text-xs text-gray-600 mr-2 font-mono">{String.fromCharCode(97 + oi)})</span>
                          {opt}
                          {correct && <span className="ml-2 text-green-400 text-xs">✓</span>}
                          {wrong   && <span className="ml-2 text-red-400 text-xs">✗</span>}
                        </button>
                      );
                    })}
                  </div>
                  {revealed && (
                    <div className="bg-gray-900 border border-gray-800 rounded px-3 py-2.5 text-xs text-gray-400 leading-relaxed">
                      <span className="text-gray-500">The math: </span>{q.math}
                    </div>
                  )}
                </div>
              );
            })}
          </div>

          {/* Actions */}
          <div className="mt-6 space-y-3">
            {allAnswered && !revealed && (
              <button
                onClick={() => setRevealed(true)}
                className="w-full py-3 rounded-lg bg-indigo-600 hover:bg-indigo-500 text-white font-medium transition-colors"
              >
                Check answers
              </button>
            )}

            {revealed && (
              <>
                <div className="bg-gray-800 border border-gray-700 rounded-lg p-4 space-y-3">
                  <div className="flex items-baseline gap-2">
                    <span className="text-3xl font-bold">{score}/{QUESTIONS.length}</span>
                    <span className="text-sm text-gray-400">
                      {score === 3 ? '— Full profile recovered from aggregate statistics alone.' :
                       score >= 2  ? '— Most of x\'s profile is recoverable.' :
                                     '— Even partial inference is a real privacy violation.'}
                    </span>
                  </div>
                  <div className="border-t border-gray-700 pt-3 space-y-1">
                    <div className="text-xs text-gray-500 uppercase tracking-wider">x was:</div>
                    <div className="flex flex-wrap gap-3 text-sm font-mono">
                      <span className="text-indigo-300">{PERSON_X.name}</span>
                      <span className="text-gray-400">·</span>
                      <span className="text-gray-300">{PERSON_X.dept}</span>
                      <span className="text-gray-400">·</span>
                      <span className="text-gray-300">${PERSON_X.salary.toLocaleString()}/yr</span>
                      <span className="text-gray-400">·</span>
                      <span className="text-gray-300">{PERSON_X.sick} sick days/yr</span>
                    </div>
                  </div>
                </div>
                <button
                  onClick={onContinue}
                  className="w-full py-3 rounded-lg bg-indigo-600 hover:bg-indigo-500 text-white font-medium transition-colors"
                >
                  How does DP prevent this? →
                </button>
              </>
            )}
          </div>
        </div>
      );
    }

    // ─── Phase 3: DP Protection ───────────────────────────────────────────────
    function PhaseDP({ onRestart }) {
      const sliderToEps = v => Math.pow(10, -1 + (v / 100) * 2);  // 0.1 → 10
      const [sliderVal, setSliderVal] = useState(50);              // starts at ε ≈ 1
      const [seed, setSeed] = useState(0);
      const epsilon = sliderToEps(sliderVal);

      // Re-sample on epsilon change OR manual re-randomize
      const noisyD  = useMemo(() => sampleNoisyStats(STATS_D,  epsilon), [epsilon, seed]);
      const noisyDX = useMemo(() => sampleNoisyStats(STATS_DX, epsilon), [epsilon, seed]);

      const rows = STAT_DEFS.map(def => {
        const noiseScale    = def.sensitivity / epsilon;
        const noisyDVal     = noisyD[def.key];
        const noisyDXVal    = noisyDX[def.key];
        const observedDelta = noisyDXVal - noisyDVal;
        const trueDelta     = STATS_DX[def.key] - STATS_D[def.key];
        // "Revealing" if observed delta clearly exceeds the noise scale
        const revealing = Math.abs(observedDelta) > 1.2 * noiseScale;
        return { def, noisyDVal, noisyDXVal, observedDelta, trueDelta, noiseScale, revealing };
      });

      const anyRevealing = rows.some(r => r.revealing);

      const label =
        epsilon < 0.5  ? 'Strong protection — differences are swamped by noise' :
        epsilon < 2    ? 'Moderate protection — some statistics are hidden' :
        epsilon < 5    ? 'Weak protection — most statistics are still detectable' :
                         'Minimal protection — noise barely masks the differences';

      return (
        <div className="max-w-3xl mx-auto px-6 py-10">
          <StepBar current={2} />

          <div className="space-y-2 mb-8">
            <h2 className="text-2xl font-bold text-gray-100">Adding differential privacy</h2>
            <p className="text-sm text-gray-400 max-w-2xl">
              Each query now returns a <strong className="text-white">noisy answer</strong> — Laplace noise calibrated to ε is added before the result is released.
              At small ε, the outputs from D and D+x become <strong className="text-white">indistinguishable</strong>:
              the analyst cannot reliably infer x's private values.
            </p>
          </div>

          {/* Slider */}
          <div className="bg-gray-900 border border-gray-800 rounded-xl p-5 mb-6 space-y-3">
            <div className="flex justify-between text-xs text-gray-500">
              <span>ε = 0.1 · high noise · strong privacy</span>
              <span>ε = 10 · low noise · weak privacy</span>
            </div>
            <input
              type="range" min="0" max="100" step="1"
              value={sliderVal}
              onChange={e => setSliderVal(Number(e.target.value))}
              className="w-full accent-indigo-500 cursor-pointer"
            />
            <div className="flex items-center gap-4">
              <span className="text-2xl font-mono font-bold text-indigo-300">ε = {epsilon.toFixed(2)}</span>
              <span className="text-xs text-gray-400 italic flex-1">{label}</span>
              <button
                onClick={() => setSeed(s => s + 1)}
                className="text-xs text-gray-500 hover:text-gray-300 border border-gray-700 hover:border-gray-500 rounded px-2.5 py-1 transition-colors shrink-0"
              >
                ↺ new sample
              </button>
            </div>
          </div>

          {/* Comparison table */}
          <div className="space-y-2 mb-6">
            <div className="text-xs text-gray-500 uppercase tracking-wider">
              Noisy query results — what the analyst sees
            </div>
            <div className="border border-gray-700 rounded-xl overflow-hidden">
              <table className="w-full text-sm">
                <thead className="bg-gray-800/80 text-xs text-gray-400">
                  <tr>
                    <th className="px-4 py-3 text-left font-medium">Statistic</th>
                    <th className="px-4 py-3 text-right font-medium font-mono">D + noise</th>
                    <th className="px-4 py-3 text-right font-medium font-mono">D+x + noise</th>
                    <th className="px-4 py-3 text-right font-medium">Observed Δ</th>
                    <th className="px-4 py-3 text-center font-medium">Detectable?</th>
                  </tr>
                </thead>
                <tbody>
                  {rows.map(({ def, noisyDVal, noisyDXVal, observedDelta, trueDelta, noiseScale, revealing }) => (
                    <tr key={def.key} className="border-t border-gray-800">
                      <td className="px-4 py-3 text-gray-300 text-xs">{def.icon} {def.label}</td>
                      <td className="px-4 py-3 text-right font-mono text-gray-400 text-xs">{def.fmt(noisyDVal)}</td>
                      <td className="px-4 py-3 text-right font-mono text-gray-400 text-xs">{def.fmt(noisyDXVal)}</td>
                      <td className="px-4 py-3 text-right font-mono text-xs">
                        <span className={observedDelta >= 0 ? 'text-red-400' : 'text-emerald-400'}>
                          {observedDelta >= 0 ? '+' : '−'}{def.fmt(Math.abs(observedDelta))}
                        </span>
                      </td>
                      <td className="px-4 py-3 text-center">
                        <span className={`text-xs px-2 py-0.5 rounded-full border font-medium ${
                          revealing
                            ? 'text-red-300 bg-red-950/60 border-red-800'
                            : 'text-green-300 bg-green-950/60 border-green-800'
                        }`}>
                          {revealing ? 'Yes' : 'Hidden'}
                        </span>
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
            <p className="text-xs text-gray-600">
              "Detectable" = observed Δ exceeds the noise scale (Δf / ε). When hidden, the noise is larger than the true signal — x cannot be distinguished from the baseline.
            </p>
          </div>

          {/* True deltas for reference */}
          <div className="bg-gray-900 border border-gray-800 rounded-xl p-4 mb-8">
            <div className="text-xs text-gray-500 uppercase tracking-wider mb-3">True signal (hidden from analyst)</div>
            <div className="grid grid-cols-2 gap-x-8 gap-y-1.5">
              {STAT_DEFS.map(def => {
                const row = rows.find(r => r.def.key === def.key);
                return (
                  <div key={def.key} className="flex justify-between items-baseline text-xs">
                    <span className="text-gray-500">{def.label}</span>
                    <span className="font-mono text-gray-300">
                      true Δ = {row.trueDelta >= 0 ? '+' : '−'}{def.fmt(Math.abs(row.trueDelta))}
                      <span className="text-gray-600 ml-1">· noise scale ≈ {def.fmt(row.noiseScale)}</span>
                    </span>
                  </div>
                );
              })}
            </div>
          </div>

          {/* Takeaway */}
          <div className="border border-indigo-800/60 bg-indigo-950/20 rounded-xl p-5 mb-6 space-y-3">
            <div className="text-sm font-semibold text-indigo-200">The core guarantee of ε-DP</div>
            <p className="text-sm text-gray-400 leading-relaxed">
              For any query output <em>O</em>, the probability of seeing <em>O</em> from database D
              versus D+x differs by at most a factor of e<sup>ε</sup>.
              At small ε, this factor is close to 1 — D and D+x are nearly indistinguishable,
              no matter what the analyst observes.
            </p>
            <div className="font-mono text-xs text-indigo-300 bg-indigo-950/40 rounded px-3 py-2">
              P[M(D) = O] ≤ e<sup>ε</sup> · P[M(D+x) = O] &nbsp;&nbsp; for all outputs O
            </div>
          </div>

          <button
            onClick={onRestart}
            className="text-xs text-gray-600 hover:text-gray-400 transition-colors"
          >
            ← Start over
          </button>
        </div>
      );
    }

    // ─── App ─────────────────────────────────────────────────────────────────
    function App() {
      const [phase, setPhase] = useState('landing');

      if (phase === 'landing') return <Landing  onStart={()    => setPhase('compare')} />;
      if (phase === 'compare') return <PhaseCompare onContinue={() => setPhase('mcqa')} />;
      if (phase === 'mcqa')    return <PhaseMCQA    onContinue={() => setPhase('dp')}   />;
      if (phase === 'dp')      return <PhaseDP      onRestart={()  => setPhase('landing')} />;
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
